<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Berry Math!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #F0F4C3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; 
        }

        #qtn {
            font-size: 4rem;
            margin: 10px 0;
            color: #33691E;
        }

        #game-container {
            background: white;
            padding: 20px;
            border-radius: 40px;
            box-shadow: 0 10px 0 #DCE775;
            text-align: center;
            border: 8px solid #AFB42B;
            width: 95%;
            max-width: 600px;
            position: relative;
        }

        #mission-text {
            font-size: 1.6rem;
            color: #33691E;
            margin-bottom: 10px;
            min-height: 50px;
            padding: 0 10px;
        }

        #berry-source {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            background: #E8F5E9;
            padding: 15px;
            border-radius: 25px;
            margin-bottom: 15px;
            border: 3px dashed #81C784;
            min-height: 100px;
        }

        .berry {
            font-size: 3rem;
            cursor: grab;
            user-select: none;
            touch-action: none;
            z-index: 10;
            display: inline-block;
            width: 50px;
            height: 50px;
            line-height: 50px;
            text-align: center;
        }

        .box-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .drop-box {
            width: 160px;
            min-height: 140px;
            border: 4px solid #AFB42B;
            border-radius: 20px;
            background-color: #FFFDE7;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: flex-start;
            padding: 10px;
            gap: 5px;
        }

        #total-display {
            font-size: 3rem;
            margin: 10px 0;
            color: #2E7D32;
            font-weight: bold;
        }

        .btn {
            background-color: #8BC34A;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 25px;
            box-shadow: 0 6px 0 #558B2F;
            display: none;
            cursor: pointer;
        }

        .berry.counted { filter: grayscale(1) opacity(0.3); cursor: default; }
    </style>
</head>
<body>
    <h1 id="qtn"></h1>

<div id="game-container">
    <div id="mission-text">Ready to learn!</div>

    <div id="berry-source"></div>

    <div class="box-container">
        <div>
            <div class="drop-box" id="box1"></div>
            <div style="font-weight:bold; color:#AFB42B; margin-top:5px;">Box 1</div>
        </div>
        <div style="font-size: 2rem;">+</div>
        <div>
            <div class="drop-box" id="box2"></div>
            <div style="font-weight:bold; color:#AFB42B; margin-top:5px;">Box 2</div>
        </div>
    </div>

    <div id="total-display">?</div>
    <button id="nextBtn" class="btn" onclick="nextMission()">Next Mission! ➔</button>
</div>

<script>
    let target1 = 0, target2 = 0;
    let mode = 'DRAG';
    let finalCounter = 0;
    let selectedVoice = null;

    function loadVoices() {
        let voices = window.speechSynthesis.getVoices();
        selectedVoice = voices.find(v => (v.lang.startsWith('en')) && (v.name.includes('Google') || v.name.includes('Samantha'))) || voices.find(v => v.lang.startsWith('en')) || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        if (selectedVoice) utterance.voice = selectedVoice;
        utterance.lang = 'en-US';
        utterance.pitch = 1.2;
        if (callback) utterance.onend = callback;
        window.speechSynthesis.speak(utterance);
    }

    function createBerries() {
        const source = document.getElementById('berry-source');
        source.innerHTML = '';
        for (let i = 1; i <= 10; i++) {
            const b = document.createElement('div');
            b.className = 'berry';
            b.id = 'berry' + i;
            b.innerText = '🫐';
            addUniversalDrag(b);
            source.appendChild(b);
        }
    }

    function addUniversalDrag(el) {
        let active = false;
        let startX, startY;

        function dragStart(e) {
            if (mode !== 'DRAG') {
                if (mode === 'COUNT') handleTap(el);
                return;
            }
            active = true;
            el.setPointerCapture(e.pointerId);
            const rect = el.getBoundingClientRect();
            startX = rect.width / 2;
            startY = rect.height / 2;
            el.style.position = 'fixed';
            el.style.zIndex = '1000';
            moveAt(e.clientX, e.clientY);
        }

        function moveAt(pageX, pageY) {
            el.style.left = pageX - startX + 'px';
            el.style.top = pageY - startY + 'px';
        }

        function onPointerMove(e) {
            if (!active) return;
            moveAt(e.clientX, e.clientY);
        }

        function onPointerUp(e) {
            if (!active) return;
            active = false;
            el.releasePointerCapture(e.pointerId);

            el.style.display = 'none';
            const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
            el.style.display = 'inline-block';

            const box = dropTarget ? dropTarget.closest('.drop-box') : null;
            el.style.position = 'static';

            if (box) {
                box.appendChild(el);
                // Speak the box count immediately
                speak(box.children.length);
            } else {
                document.getElementById('berry-source').appendChild(el);
            }
            
            // Trigger recount for iPad safety
            checkDragCompletion();
        }

        el.addEventListener("pointerdown", dragStart);
        el.addEventListener("pointermove", onPointerMove);
        el.addEventListener("pointerup", onPointerUp);
        el.addEventListener("pointercancel", onPointerUp); // Handles iPad gesture interruptions
    }

    function handleTap(el) {
        if (!el.classList.contains('counted') && el.parentElement.classList.contains('drop-box')) {
            finalCounter++;
            el.classList.add('counted');
            const totalGoal = target1 + target2;
            
            if (finalCounter === totalGoal) {
                speak(finalCounter, function() {
                    setTimeout(() => {
                        speak(`Great job! ${target1} plus ${target2} is ${finalCounter}!`);
                        document.getElementById('nextBtn').style.display = 'inline-block';
                    }, 300);
                });
            } else {
                speak(finalCounter);
            }
            document.getElementById('total-display').innerText = finalCounter;
        }
    }

    function checkDragCompletion() {
        const b1 = document.getElementById('box1').children.length;
        const b2 = document.getElementById('box2').children.length;

        if (b1 === target1 && b2 === target2) {
            // Use a small timeout to ensure the voice finish speaking the last berry drop
            setTimeout(() => {
                if (mode === 'DRAG') { // Prevent double-triggering
                    mode = 'COUNT';
                    const msg = "Perfect! Now tap the berries to count them!";
                    document.getElementById('mission-text').innerText = msg;
                    speak(msg);
                }
            }, 500);
        }
    }

    function nextMission() {
        window.speechSynthesis.cancel();
        createBerries();
        target1 = Math.floor(Math.random() * 3) + 2; 
        target2 = Math.floor(Math.random() * 3) + 2; 
        finalCounter = 0;
        mode = 'DRAG';
        document.getElementById('box1').innerHTML = '';
        document.getElementById('box2').innerHTML = '';
        document.getElementById('total-display').innerText = "?";
        document.getElementById('nextBtn').style.display = 'none';
        
        const question = `${target1} + ${target2}`;
        document.getElementById('qtn').innerText = question;
        
        const msg = `Put ${target1} in Box 1 and ${target2} in Box 2!`;
        document.getElementById('mission-text').innerText = msg;
        
        // Delay speech slightly for iPad loading
        setTimeout(() => speak(msg), 200);
    }

    window.onload = () => setTimeout(nextMission, 800);
</script>

</body>
</html>
