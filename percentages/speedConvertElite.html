<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraction Conversion Challenge</title>
    <link rel="stylesheet" href="../assets/css/certification.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 550px; border: 1px solid #334155; }
        .stats-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #94a3b8; }
        .progress-container { width: 100%; height: 12px; background: #0f172a; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #10b981; transition: width 0.4s; }
        .target-box { background: #1e293b; padding: 30px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #10b981; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .target-label { font-size: 11px; text-transform: uppercase; color: #10b981; margin-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        .big-frac { display: inline-flex; flex-direction: column; align-items: center; font-size: 52px; font-weight: bold; }
        .big-frac .num { padding-bottom: 5px; }
        .big-frac .den { border-top: 5px solid white; padding-top: 5px; min-width: 80px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: center; gap: 10px; background: #334155; padding: 20px; border-radius: 15px; }
        .input-group label { font-size: 12px; font-weight: bold; color: #cbd5e1; }
        input { background: #0f172a; border: 2px solid #475569; color: white; width: 130px; padding: 15px; border-radius: 10px; text-align: center; font-size: 24px; outline: none; }
        input:focus { border-color: #10b981; }
        #msg { margin-top: 25px; font-weight: bold; font-size: 15px; color: #94a3b8; }
        .highlight { color: #f59e0b; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats-bar">
        <span id="levelDisplay">Problem 1 of 100</span>
        <span id="streakDisplay">Mastery: 0%</span>
    </div>
    <div class="progress-container"><div id="progressBar"></div></div>
    <div class="target-box">
        <div class="target-label">CONVERT THIS FRACTION</div>
        <div id="targetVal">---</div>
    </div>
    <div class="input-grid">
        <div class="input-group">
            <label id="decLabel">Decimal</label>
            <input type="number" step="any" id="inDec" placeholder="0.00">
        </div>
        <div class="input-group">
            <label id="perLabel">Percentage</label>
            <div style="display:flex; align-items:center; gap:5px;"><input type="number" step="any" id="inPer" placeholder="0"><span style="font-size:24px;">%</span></div>
        </div>
    </div>
    <div id="msg">If it repeats, <span class="highlight">round to the hundredths (.00)</span></div>
</div>
    <!---cert--->
    <div>
            <h1 id="scoreboard">score: 0 missed: 0</h1>
        </div>
        <div id="certOverlay">
            <div id="cert">
                <h1 style="font-size: 50px; color: #1a3a5f; margin: 0">ALGEBRA EXCELLENCE</h1>
                <p style="font-size: 24px">This award is proudly presented to</p>
                <h2
                    id="certName"
                    style="
                        font-size: 45px;
                        border-bottom: 2px solid #1a3a5f;
                        display: inline-block;
                        padding: 0 50px;
                        margin: 20px 0;
                    ">
                    Student Name
                </h2>
                <p style="font-size: 20px">For successfully solving 100 Fractions problems!</p>
                <p style="font-size: 20px" id="gradeMsg"></p>
                <div style="margin-top: 30px; font-size: 80px">⭐ 100 ⭐</div>

                <div class="no-print" style="margin-top: 30px">
                    <button onclick="window.print()" style="background: #859900">Print Certificate</button>
                    <button
                        onclick="document.getElementById('certOverlay').style.display='none'"
                        style="background: #93a1a1">
                        Back to Game
                    </button>
                </div>
            </div>
        </div>
<script src="../assets/JS/GameOverlay.js"></script>


<script>
    const pool = [
        {n:1, d:3, dec:0.33, per:33.3}, {n:2, d:3, dec:0.67, per:66.7},
        {n:1, d:6, dec:0.17, per:16.7}, {n:5, d:6, dec:0.83, per:83.3},
        {n:1, d:7, dec:0.14, per:14.3}, {n:1, d:9, dec:0.11, per:11.1},
        {n:4, d:9, dec:0.44, per:44.4}, {n:1, d:11, dec:0.09, per:9.1},
        {n:1, d:12, dec:0.08, per:8.3}, {n:5, d:4, dec:1.25, per:125},
        {n:3, d:2, dec:1.5, per:150}, {n:7, d:8, dec:0.875, per:87.5},
        {n:1, d:8, dec:0.125, per:12.5}, {n:9, d:10, dec:0.9, per:90},
        {n:11, d:12, dec:0.92, per:91.7}
    ];

    let currentIndex = 0;
    let currentTask = {};
    let checked = false;
    setGameName("speedConvertElite");
    showScore();


    function generate() {
        if (currentIndex >= 100) {
            document.getElementById('msg').innerHTML = "🏆 CHALLENGE COMPLETE!";
            return;
        }
        // Picks from the pool or generates a random hard one
        currentTask = pool[Math.floor(Math.random() * pool.length)];
        
        document.getElementById('targetVal').innerHTML = `
            <div class="big-frac">
                <div class="num">${currentTask.n}</div>
                <div class="den">${currentTask.d}</div>
            </div>`;
        
        document.getElementById('levelDisplay').textContent = `Problem ${currentIndex + 1} of 100`;
        document.getElementById('inDec').value = "";
        document.getElementById('inPer').value = "";
        document.getElementById('inDec').focus();
    }

    function check() {
        let uDec = parseFloat(document.getElementById('inDec').value);
        let uPer = parseFloat(document.getElementById('inPer').value);

        // Smart check: Accepts within a tiny margin to allow for rounding variations
        let dMatch = Math.abs(uDec - currentTask.dec) < 0.011;
        let pMatch = Math.abs(uPer - currentTask.per) < 0.2;

        if (dMatch && pMatch) {
            currentIndex++;
            document.getElementById('progressBar').style.width = currentIndex + "%";
            document.getElementById('streakDisplay').textContent = `Mastery: ${currentIndex}%`;
            document.getElementById('msg').style.color = "#10b981";
            document.getElementById('msg').textContent = "Correct!";
            //cert
            if(!checked){
                        correct();
                    }
                    checked = true;
                    setTimeout(() => {
                       generate();
                       checked = false;
                    }, 800);
        } else {
            document.getElementById('msg').style.color = "#ef4444";
            document.getElementById('msg').textContent = "Check your rounding!";
            wrong();
        }
        showScore();
    }

    // Navigation
    document.getElementById('inDec').addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); document.getElementById('inPer').focus(); }
        if (e.key === 'Enter') check();
    });
    document.getElementById('inPer').addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); document.getElementById('inDec').focus(); }
        if (e.key === 'Enter') check();
    });

    generate();
</script>
</body>
</html>
