<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Percent Match Game - Fixed</title>
    <link rel="stylesheet" href="../assets/css/certification.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 500px; border: 1px solid #334155; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
        
        /* Fixed Target Box for Fractions */
        .target-box { background: #334155; padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #38bdf8; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .target-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #38bdf8; margin-bottom: 10px; }
        
        /* The Fraction Styling */
        .target-value { font-size: 48px; font-weight: bold; line-height: 1; }
        .big-frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; }
        .big-frac .num { padding-bottom: 5px; }
        .big-frac .den { border-top: 5px solid white; padding-top: 5px; min-width: 60px; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .input-group label { font-size: 14px; color: #94a3b8; }
        
        input { background: #0f172a; border: 2px solid #475569; color: white; width: 100px; padding: 12px; border-radius: 8px; text-align: center; font-size: 20px; outline: none; transition: 0.2s; }
        input:focus { border-color: #38bdf8; background: #1e293b; }
        
        .frac-input-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .frac-input-wrap input { width: 60px; padding: 8px; font-size: 18px; }
        .divider { width: 50px; height: 3px; background: white; }

        .correct { border-color: #10b981 !important; color: #10b981; }
        .error { border-color: #ef4444 !important; }
        
        #msg { margin-top: 20px; font-weight: bold; min-height: 20px; font-size: 14px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <span id="timer">Time: 0.0s</span>
        <span id="streak">Streak: 0</span>
    </div>

    <div class="target-box">
        <div id="targetType" class="target-label">Loading...</div>
        <div id="targetVal" class="target-value"></div>
    </div>

    <div class="input-grid">
        <div class="input-group" id="group-dec">
            <label>Decimal</label>
            <input type="number" step="0.01" id="inDec" placeholder="0.00">
        </div>
        
        <div class="input-group" id="group-per">
            <label>Percentage</label>
            <div style="display:flex; align-items:center; gap:5px;">
                <input type="number" id="inPer" placeholder="0">
                <span style="font-size:24px; font-weight:bold;">%</span>
            </div>
        </div>

        <div class="input-group" id="group-frac" style="grid-column: span 2;">
            <label>Simplified Fraction</label>
            <div class="frac-input-wrap">
                <input type="number" id="inFracN" placeholder="N">
                <div class="divider"></div>
                <input type="number" id="inFracD" placeholder="D">
            </div>
        </div>
    </div>

    <div id="msg">Simplify all fractions!</div>
</div>
<!---cert--->
    <div>
            <h1 id="scoreboard">score: 0 missed: 0</h1>
        </div>
        <div id="certOverlay">
            <div id="cert">
                <h1 style="font-size: 50px; color: #1a3a5f; margin: 0">ALGEBRA EXCELLENCE</h1>
                <p style="font-size: 24px">This award is proudly presented to</p>
                <h2
                    id="certName"
                    style="
                        font-size: 45px;
                        border-bottom: 2px solid #1a3a5f;
                        display: inline-block;
                        padding: 0 50px;
                        margin: 20px 0;
                    ">
                    Student Name
                </h2>
                <p style="font-size: 20px">For successfully solving 100 Fractions problems!</p>
                <p style="font-size: 20px" id="gradeMsg"></p>
                <div style="margin-top: 30px; font-size: 80px">⭐ 100 ⭐</div>

                <div class="no-print" style="margin-top: 30px">
                    <button onclick="window.print()" style="background: #859900">Print Certificate</button>
                    <button
                        onclick="document.getElementById('certOverlay').style.display='none'"
                        style="background: #93a1a1">
                        Back to Game
                    </button>
                </div>
            </div>
        </div>
<script src="../assets/JS/GameOverlay.js"></script>


<script>
    let current = {};
    let streak = 0;
    let startTime = Date.now();
    let checked = false;
    setGameName("speedConvert");
    showScore();


    function getGCD(a, b) { return b ? getGCD(b, a % b) : Math.abs(a); }

    function generate() {
        const types = ['decimal', 'percent', 'fraction'];
        const type = types[Math.floor(Math.random() * types.length)];
        
        const percents = [5, 10, 20, 25, 30, 40, 50, 60, 70, 75, 80, 90];
        let stardust = Math.random()*10;
        let p = 0;
        if(stardust > 7){
            p = Math.floor(Math.random()*100);
        }
        else{
            p = percents[Math.floor(Math.random() * percents.length)];
        }
        
        
        let d = p / 100;
        let common = getGCD(p, 100);
        let fn = p / common;
        let fd = 100 / common;

        current = { p, d, fn, fd, type };

        const targetDisplay = document.getElementById('targetVal');
        const targetLabel = document.getElementById('targetType');

        if (type === 'decimal') {
            targetLabel.textContent = "Decimal";
            targetDisplay.textContent = d.toFixed(2);
        } else if (type === 'percent') {
            targetLabel.textContent = "Percentage";
            targetDisplay.textContent = p + "%";
        } else {
            targetLabel.textContent = "Fraction";
            targetDisplay.innerHTML = `
                <div class="big-frac">
                    <div class="num">${fn}</div>
                    <div class="den">${fd}</div>
                </div>`;
        }

        document.querySelectorAll('input').forEach(i => { i.value = ""; i.classList.remove('correct','error'); });
        document.querySelectorAll('.input-group').forEach(g => g.style.opacity = "1");
        
        if (type === 'decimal') document.getElementById('group-dec').style.opacity = "0.2";
        if (type === 'percent') document.getElementById('group-per').style.opacity = "0.2";
        if (type === 'fraction') document.getElementById('group-frac').style.opacity = "0.2";

        if (type === 'decimal') document.getElementById('inPer').focus();
        else document.getElementById('inDec').focus();
        
        startTime = Date.now();
    }

    function check() {
        let uD = parseFloat(document.getElementById('inDec').value);
        let uP = parseInt(document.getElementById('inPer').value);
        let uFN = parseInt(document.getElementById('inFracN').value);
        let uFD = parseInt(document.getElementById('inFracD').value);

        let decMatch = (current.type === 'decimal' || Math.abs(uD - current.d) < 0.001);
        let perMatch = (current.type === 'percent' || uP === current.p);
        let fracMatch = (current.type === 'fraction' || (uFN === current.fn && uFD === current.fd));

        if (decMatch && perMatch && fracMatch) {
            streak++;
            document.querySelectorAll('input').forEach(i => i.classList.add('correct'));
            document.getElementById('msg').textContent = "MATCHED!";
            document.getElementById('msg').style.color = "#10b981";
            //cert
            if(!checked){
                        correct();
                    }
                    checked = true;
                    setTimeout(() => {
                       generate();
                       checked = false;
                    }, 800);
        } else {
            document.getElementById('msg').textContent = "Not quite. Check your simplification!";
            document.getElementById('msg').style.color = "#ef4444";
            wrong();
        }
        document.getElementById('streak').textContent = "Streak: " + streak;
        showScore();
    }

    const ids = ['inDec', 'inPer', 'inFracN', 'inFracD'];
    ids.forEach((id, idx) => {
        document.getElementById(id).addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); document.getElementById(ids[(idx+1)%4]).focus(); }
            if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); document.getElementById(ids[(idx+3)%4]).focus(); }
            if (e.key === 'Enter') check();
        });
    });

    setInterval(() => {
        let elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById('timer').textContent = `Time: ${elapsed}s`;
    }, 100);

    generate();
</script>
</body>
</html>
