<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Detective: Smooth iPad Edition</title>
    <style>
        :root { --p1: #38bdf8; --bg: #0f172a; --gold: #fbbf24; --green: #2ed573; --red: #fb7185; }
        
        /* THE FIX: Disables all system gestures so ONLY the cards move */
        * { 
            touch-action: none; 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: white; margin: 0; padding: 15px; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        .container { width: 100%; max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; flex: 1; }
        .panel { background: #1e293b; border-radius: 20px; padding: 20px; border: 1px solid #334155; }

        /* SLOT AREA */
        #sort-area { 
            display: flex; justify-content: center; gap: 10px; min-height: 80px; 
            padding: 15px; border: 2px dashed #334155; border-radius: 15px; 
            background: rgba(255,255,255,0.02); margin-bottom: 10px; position: relative;
        }

        .slot {
            width: 65px; height: 75px; border: 2px dashed rgba(56, 189, 248, 0.2);
            border-radius: 12px; position: relative; display: flex; justify-content: center; align-items: center;
        }

        .data-card { 
            width: 55px; height: 65px; background: var(--p1); color: #0f172a; 
            font-weight: 900; border-radius: 10px; font-size: 1.4rem; 
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 0 #0369a1; cursor: grab; position: relative; z-index: 10;
        }

        .dragging { 
            position: fixed !important; z-index: 9999 !important; 
            opacity: 0.9; transform: scale(1.1); pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* INPUTS */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .box-input { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.7rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        input { 
            padding: 10px; border-radius: 10px; border: 2px solid #475569; 
            background: #0f172a; color: white; font-size: 1.1rem; width: 100%;
        }

        .iqr-highlight { border: 2px solid var(--gold); background: rgba(251, 191, 36, 0.05); padding: 15px; border-radius: 15px; margin-top: 15px; }
        
        button { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 10px;
        }
        .btn-check { background: var(--green); color: #0f172a; }
        .btn-new { background: #334155; color: white; }

        #msg { text-align: center; font-weight: bold; margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3 style="margin:0 0 10px 0; color:var(--gold)">1. Evidence Slots</h3>
        <div id="sort-area"></div>
    </div>

    <div class="panel" style="flex: 1; overflow-y: auto;">
        <h3 style="margin:0 0 10px 0;">2. Stats Analysis</h3>
        <div class="grid">
            <div class="box-input"><label>Mean (nearest tenth)</label><input type="number" id="ans-mean" step="0.1"></div>
            <div class="box-input"><label>Median</label><input type="number" id="ans-median" step="0.1"></div>
            <div class="box-input"><label>Range</label><input type="number" id="ans-range"></div>
            <div class="box-input"><label>Q1</label><input type="number" id="ans-q1" step="0.1"></div>
            <div class="box-input"><label>Q3</label><input type="number" id="ans-q3" step="0.1"></div>
            <div class="box-input" style="text-align: center;"><label>XP</label><div id="score" style="font-size:1.5rem; color:var(--green); font-weight:900">0</div></div>
        </div>

        <div class="iqr-highlight">
            <label style="color:var(--gold)">⚡ INTERQUARTILE RANGE (Q3 - Q1)</label>
            <input type="number" id="ans-iqr" step="0.1" style="border-color: var(--gold); margin-top:5px;">
        </div>

        <div id="msg"></div>

        <button class="btn-check" onclick="check()">SUBMIT REPORT</button>
        <button class="btn-new" onclick="setup()">NEW CASE</button>
    </div>
</div>

<script>
    let stats = {}; let score = 0;

    function setup() {
        const raw = Array.from({length: 8}, () => Math.floor(Math.random() * 25) + 2);
        const sorted = [...raw].sort((a,b)=>a-b);
        const getM = (a) => a.length % 2 === 0 ? (a[a.length/2-1]+a[a.length/2])/2 : a[Math.floor(a.length/2)];
        stats = { min: sorted[0], max: sorted[7], med: getM(sorted), q1: getM(sorted.slice(0, 4)), q3: getM(sorted.slice(4)) };

        const area = document.getElementById('sort-area'); area.innerHTML = '';
        raw.forEach(n => {
            const card = document.createElement('div');
            card.className = 'data-card'; card.innerText = n;

            card.onpointerdown = (e) => {
                const rect = card.getBoundingClientRect();
                const offsetX = e.clientX - rect.left;
                const offsetY = e.clientY - rect.top;
                
                // Create the placeholder
                const placeholder = document.createElement('div');
                placeholder.className = 'placeholder';
                card.after(placeholder);

                card.classList.add('dragging');
                card.style.left = rect.left + 'px';
                card.style.top = rect.top + 'px';
                card.style.width = rect.width + 'px';

                card.setPointerCapture(e.pointerId);

                card.onpointermove = (em) => {
                    // Follow finger
                    card.style.left = (em.clientX - offsetX) + 'px';
                    card.style.top = (em.clientY - offsetY) + 'px';

                    // Find nearest spot
                    const others = [...area.querySelectorAll('.data-card:not(.dragging), .placeholder')];
                    const next = others.find(c => em.clientX < c.getBoundingClientRect().left + c.offsetWidth/2);
                    if (next !== placeholder) area.insertBefore(placeholder, next || null);
                };

                card.onpointerup = () => {
                    card.classList.remove('dragging');
                    card.style.position = ''; card.style.left = ''; card.style.top = ''; card.style.width = '';
                    placeholder.replaceWith(card);
                    card.onpointermove = null;
                };
            };
            area.appendChild(card);
        });
    }

    function check() {
        const nums = [...document.querySelectorAll('.data-card')].map(c => parseInt(c.innerText));
        const sorted = [...nums].sort((a,b) => a-b);
        const isSorted = JSON.stringify(nums) === JSON.stringify(sorted);
        
        const getM = (a) => (a[Math.floor((a.length-1)/2)] + a[Math.ceil((a.length-1)/2)]) / 2;

        const ans = {
            mean: parseFloat((sorted.reduce((a,b)=>a+b,0)/8).toFixed(1)),
            med: getM(sorted),
            range: Math.max(...sorted) - Math.min(...sorted),
            q1: getM(sorted.slice(0, 4)),
            q3: getM(sorted.slice(4)),
            iqr: getM(sorted.slice(4)) - getM(sorted.slice(0, 4))
        };

        const inputs = {
            'ans-mean': ans.mean, 'ans-median': ans.med, 'ans-range': ans.range,
            'ans-q1': ans.q1, 'ans-q3': ans.q3, 'ans-iqr': ans.iqr
        };

        let correctCount = 0;
        for (let id in inputs) {
            const el = document.getElementById(id);
            if (parseFloat(el.value) === inputs[id]) {
                el.style.borderColor = 'var(--green)';
                correctCount++;
            } else {
                el.style.borderColor = 'var(--red)';
            }
        }

        const msg = document.getElementById('msg');
        if (!isSorted) {
            msg.innerText = "❌ Evidence out of order!";
            msg.style.color = "var(--gold)";
        } else if (correctCount === 6) {
            score += 100;
            document.getElementById('score').innerText = score;
            msg.innerText = "✅ Case Solved! +100 XP";
            msg.style.color = "var(--green)";
        } else {
            msg.innerText = "Check your calculations!";
            msg.style.color = "var(--red)";
        }
    }

    setup();
</script>
</body>
</html>
