<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplication: Area vs. Column</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f1f5f9; padding: 20px; color: #1e293b;}
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 850px; text-align: center;}
        .main-ui { display: flex; gap: 30px; margin-top: 20px; justify-content: center;}
        
        /* Column Math Styles */
        .column-math { font-family: 'Courier New', monospace; font-size: 32px; font-weight: bold; text-align: right; line-height: 1.2; width: 200px; padding: 20px; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc;}
        .bar { border-bottom: 4px solid #1e293b; display: inline-block; width: 100%; margin: 5px 0;}
        .carry { font-size: 18px; color: #ef4444; position: absolute; }
        .p1 { color: #f59e0b; } /* Partial Product 1 */
        .p2 { color: #2563eb; } /* Partial Product 2 */

        /* SVG / Area Model Styles */
        svg { background: #fff; border: 1px solid #cbd5e1; border-radius: 8px; }
        .tile { stroke-width: 2; transition: 0.5s; cursor: pointer; }
        .tile:hover { opacity: 0.8; }
        .label { font-size: 16px; font-weight: bold; pointer-events: none; }
        .dim-label { font-size: 14px; fill: #64748b; font-weight: bold; }

        .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; transition: 0.2s;}
        .btn:hover { background: #1d4ed8; }
        #msg { margin-top: 15px; font-weight: bold; min-height: 24px; color: #64748b;}
    </style>
</head>
<body>

<div class="card">
    <h2>Visualizing Multiplication</h2>
    <p>Standard Algorithm vs. Area Model for <span id="problemExp" style="font-weight:bold; color:#2563eb;">35 × 12</span></p>

    <div class="main-ui">
        <div id="colMath" class="column-math">
            <div>
                <span class="carry" style="top:-25px; left:40px;">¹</span>
                <span class="carry" style="top:-25px; left:65px;">¹</span>
                35
            </div>
            <div>× 12<span class="bar"></span></div>
            <div class="p1" id="cp1">70</div>
            <div class="p2" id="cp2">350<span class="bar"></span></div>
            <div id="cTotal">420</div>
        </div>

        <svg id="canvas" width="550" height="350">
            <g id="dims">
                <text x="140" y="30" class="dim-label" text-anchor="middle" id="labT1">30</text>
                <text x="250" y="30" class="dim-label" text-anchor="middle" id="labT2">5</text>
                <text x="50" y="115" class="dim-label" text-anchor="end" id="labL1">10</text>
                <text x="50" y="225" class="dim-label" text-anchor="end" id="labL2">2</text>
            </g>

            <g transform="translate(70, 50)">
                <rect class="tile" id="q1" x="0" y="0" width="140" height="130" fill="#dbeafe" stroke="#2563eb" onclick="showPart(1)" />
                <text class="label" x="70" y="70" text-anchor="middle" fill="#1e40af" id="txt1">30×10=300</text>

                <rect class="tile" id="q2" x="140" y="0" width="70" height="130" fill="#fee2e2" stroke="#ef4444" onclick="showPart(2)" />
                <text class="label" x="175" y="70" text-anchor="middle" fill="#b91c1c" id="txt2">5×10=50</text>

                <rect class="tile" id="q3" x="0" y="130" width="140" height="60" fill="#fef3c7" stroke="#f59e0b" onclick="showPart(3)" />
                <text class="label" x="70" y="165" text-anchor="middle" fill="#b45309" id="txt3">30×2=60</text>

                <rect class="tile" id="q4" x="140" y="130" width="70" height="60" fill="#dcfce7" stroke="#10b981" onclick="showPart(4)" />
                <text class="label" x="175" y="165" text-anchor="middle" fill="#15803d" id="txt4">5×2=10</text>
            </g>
        </svg>
    </div>

    <div id="msg">Click a section of the rectangle to see its math!</div>
    <button class="btn" onclick="init()">Generate New Problem</button>
</div>

<script>
    let N1, N2; // Main numbers
    let t1, t2, l1, l2; // Split parts (Tens/Ones)
    let solutions = {};

    function init() {
        // Generate two 2-digit numbers (12-49 range for good visualization)
        N1 = Math.floor(Math.random() * 38) + 12; 
        N2 = Math.floor(Math.random() * 38) + 12;

        // Split them (e.g., 35 -> 30, 5)
        t1 = Math.floor(N1 / 10) * 10; t2 = N1 % 10;
        l1 = Math.floor(N2 / 10) * 10; l2 = N2 % 10;

        // Calculate all partial products
        solutions = {
            p1: t1 * l1, // Tens x Tens
            p2: t2 * l1, // Ones x Tens
            p3: t1 * l2, // Tens x Ones
            p4: t2 * l2, // Ones x Ones
            row1: N1 * l1, // The 350 in column math
            row2: N1 * l2, // The 70 in column math
            total: N1 * N2
        };

        // 1. Update Problem Displays
        document.getElementById('problemExp').textContent = `${N1} × ${N2}`;
        document.getElementById('msg').textContent = "Click a section of the rectangle to see its math.";
        document.getElementById('msg').style.color = "#64748b";

        // 2. Update Column Math Display (Hidden initially)
        updateColumnMath(true);

        // 3. Update Area Model SVG
        updateAreaModel();
    }

    function updateColumnMath(hide) {
        const col = document.getElementById('colMath');
        col.innerHTML = ""; // Reset

        const addLine = (txt, cls, id) => {
            let div = document.createElement('div');
            if(cls) div.className = cls;
            if(id) div.id = id;
            div.innerHTML = txt;
            col.appendChild(div);
        };

        // Standard Algorithm (formatted vertically)
        // Hand-coding the carry logic and formatting for simplicity
        addLine(`&nbsp;&nbsp;${N1}`, "n1");
        addLine(`×&nbsp;${N2}<span class="bar"></span>`, "n2");
        addLine(hide ? "&nbsp;&nbsp;??" : `&nbsp;&nbsp;${solutions.row2}`, "p1", "cp1"); // e.g., 35*2
        addLine(hide ? `&nbsp;??0<span class="bar"></span>` : `&nbsp;${solutions.row1}<span class="bar"></span>`, "p2", "cp2"); // e.g., 35*10
        addLine(hide ? "&nbsp;???" : `&nbsp;${solutions.total}`, "total", "cTotal");
    }

    function updateAreaModel() {
        // Dimensions (scaled for visibility)
        const scaleH = 120 / t1; // Scale the height of the '10' row based on its value
        const scaleW = 140 / t1; // Scale the width of the '30' column
        
        // This scaling logic is tricky. For visualization, 
        // we will use fixed base sizes but label them accurately.
        
        // Labels (Top & Left)
        document.getElementById('labT1').textContent = t1;
        document.getElementById('labT2').textContent = t2;
        document.getElementById('labL1').textContent = l1;
        document.getElementById('labL2').textContent = l2;

        // Reset Tiles (Hide labels, reset strokes)
        for(let i=1; i<=4; i++) {
            document.getElementById('txt'+i).style.display = 'none';
            document.getElementById('q'+i).setAttribute('stroke-width', '2');
        }
        
        // Quad 1: Tens x Tens
        document.getElementById('txt1').textContent = `${t1}×${l1}=${solutions.p1}`;
        // Quad 2: Ones x Tens
        document.getElementById('txt2').textContent = `${t2}×${l1}=${solutions.p2}`;
        // Quad 3: Tens x Ones
        document.getElementById('txt3').textContent = `${t1}×${l2}=${solutions.p3}`;
        // Quad 4: Ones x Ones
        document.getElementById('txt4').textContent = `${t2}×${l2}=${solutions.p4}`;
    }

    function showPart(qNum) {
        // Highlight selected tile
        for(let i=1; i<=4; i++) document.getElementById('q'+i).setAttribute('stroke-width', (i===qNum ? '4' : '2'));
        
        // Reveal label
        document.getElementById('txt'+qNum).style.display = 'block';

        // Connect back to standard algorithm
        const msg = document.getElementById('msg');
        let m = "";

        if (qNum === 4 || qNum === 3) {
            // These two parts (30x2 and 5x2) combine to make the FIRST ROW of column math (70)
            m = `Sections ${solutions.p3} and ${solutions.p4} (multiplying by ${l2}) add up to ${solutions.row2}.`;
            updateColumnMath(false); // Reveal CP1
            document.getElementById('cp1').style.color = "#ec4899"; // Pink highlight
            document.getElementById('msg').style.color = "#ec4899";
        } else if (qNum === 2 || qNum === 1) {
            // These two parts (30x10 and 5x10) combine to make the SECOND ROW of column math (350)
            m = `Sections ${solutions.p1} and ${solutions.p2} (multiplying by ${l1}) add up to ${solutions.row1}.`;
            updateColumnMath(false); // Reveal CP2
            document.getElementById('cp2').style.color = "#10b981"; // Green highlight
            document.getElementById('msg').style.color = "#10b981";
        }
        msg.textContent = m;
    }

    init();
</script>
</body>
</html>
