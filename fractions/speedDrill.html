<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Mixed Number Drill</title>
    <link rel="stylesheet" href="../assets/css/certification.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 550px; border: 1px solid #334155; }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
        .problem-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 25px 0; }
        .frac { display: flex; flex-direction: column; align-items: center; font-size: 32px; font-weight: bold; }
        .frac span { border-top: 3px solid white; width: 100%; padding-top: 5px; margin-top: 5px; }
        .op { font-size: 36px; font-weight: bold; color: #38bdf8; }

        .mixed-container { display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; padding: 20px; background: #334155; border-radius: 12px; border: 2px dashed #475569; }
        .whole-input { width: 60px; height: 60px; font-size: 32px; background: #0f172a; border: 2px solid #38bdf8; color: white; text-align: center; border-radius: 8px; outline: none; }

        .answer-box { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        input { background: #0f172a; border: 2px solid #475569; color: white; width: 70px; padding: 10px; border-radius: 8px; text-align: center; font-size: 24px; outline: none; }
        input:focus { border-color: #38bdf8; }
        .divider { width: 60px; height: 3px; background: white; margin: 2px 0; }

        .correct { border-color: #10b981 !important; color: #10b981; }
        .error { border-color: #ef4444 !important; }
        #msg { margin-top: 15px; font-weight: bold; min-height: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <span id="timer">Time: 0.0s</span>
        <span id="streak">Streak: 0</span>
    </div>

    <div class="problem-container">
        <div class="frac"><div id="n1">?</div><span id="d1">?</span></div>
        <div class="op" id="operator">?</div>
        <div class="frac"><div id="n2">?</div><span id="d2">?</span></div>
        <div class="op">=</div>
        <div class="answer-box">
            <input type="number" id="ansN" placeholder="N">
            <div class="divider"></div>
            <input type="number" id="ansD" placeholder="D">
        </div>
    </div>

    <div id="mixedArea" class="mixed-container">
        <div style="display:flex; flex-direction:column; align-items:flex-start;">
            <span style="font-size: 12px; color: #94a3b8; margin-bottom:5px;">Mixed/Whole Form:</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <input type="number" id="mixW" class="whole-input" placeholder="W">
                <div class="answer-box" id="mixFracPart">
                    <input type="number" id="mixN" style="width: 45px; font-size: 18px;" placeholder="n">
                    <div class="divider" style="width: 40px;"></div>
                    <input type="number" id="mixD" style="width: 45px; font-size: 18px;" placeholder="d">
                </div>
            </div>
        </div>
    </div>

    <div id="msg">Simplify the fraction first!</div>
</div>
<!---cert--->
    <div>
            <h1 id="scoreboard">score: 0 missed: 0</h1>
        </div>
        <div id="certOverlay">
            <div id="cert">
                <h1 style="font-size: 50px; color: #1a3a5f; margin: 0">ALGEBRA EXCELLENCE</h1>
                <p style="font-size: 24px">This award is proudly presented to</p>
                <h2
                    id="certName"
                    style="
                        font-size: 45px;
                        border-bottom: 2px solid #1a3a5f;
                        display: inline-block;
                        padding: 0 50px;
                        margin: 20px 0;
                    ">
                    Student Name
                </h2>
                <p style="font-size: 20px">For successfully solving 100 Fractions problems!</p>
                <p style="font-size: 20px" id="gradeMsg"></p>
                <div style="margin-top: 30px; font-size: 80px">⭐ 100 ⭐</div>

                <div class="no-print" style="margin-top: 30px">
                    <button onclick="window.print()" style="background: #859900">Print Certificate</button>
                    <button
                        onclick="document.getElementById('certOverlay').style.display='none'"
                        style="background: #93a1a1">
                        Back to Game
                    </button>
                </div>
            </div>
        </div>
<script src="../assets/JS/GameOverlay.js"></script>

<script>
    let current = {};
    let streak = 0;
    let startTime = Date.now();
    let isMixedRequired = false;
    let checked = false;
    setGameName("fractionSpeedDrill");
    showScore();

    function getGCD(a, b) { return b ? getGCD(b, a % b) : Math.abs(a); }

    function generate() {
        const ops = ['+', '*', '/'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        const dens = [2, 3, 4, 5, 6, 8];
        
        let d1 = dens[Math.floor(Math.random() * dens.length)];
        let d2 = dens[Math.floor(Math.random() * dens.length)];
        let n1 = Math.floor(Math.random() * 8) + 1;
        let n2 = Math.floor(Math.random() * 8) + 1;

        let rawN, rawD;
        if (op === '+') { rawN = n1*d2 + n2*d1; rawD = d1*d2; }
        else if (op === '*') { rawN = n1*n2; rawD = d1*d2; }
        else { rawN = n1*d2; rawD = d1*n2; }

        let common = getGCD(rawN, rawD);
        let finalN = rawN / common;
        let finalD = rawD / common;

        current = {
            n: finalN, d: finalD,
            w: Math.floor(finalN / finalD),
            mn: finalN % finalD,
            md: finalD
        };

        isMixedRequired = finalN >= finalD;

        document.getElementById('n1').textContent = n1;
        document.getElementById('d1').textContent = d1;
        document.getElementById('n2').textContent = n2;
        document.getElementById('d2').textContent = d2;
        document.getElementById('operator').textContent = op;
        
        document.querySelectorAll('input').forEach(i => { i.value = ""; i.classList.remove('correct','error'); });
        document.getElementById('mixedArea').style.display = 'none';
        document.getElementById('ansN').focus();
        startTime = Date.now();
    }

    function check() {
        let uN = parseInt(document.getElementById('ansN').value);
        let uD = parseInt(document.getElementById('ansD').value);
        
        if (uN === current.n && uD === current.d) {
            document.getElementById('ansN').classList.add('correct');
            document.getElementById('ansD').classList.add('correct');
            
            if (isMixedRequired) {
                document.getElementById('mixedArea').style.display = 'flex';
                document.getElementById('msg').textContent = current.mn === 0 ? "It's a whole number! Just type the whole part." : "Now convert to a mixed number.";
                document.getElementById('mixW').focus();
            } else {
                complete();
            }
        } else {
            fail();
        }
        showScore();
    }

    function checkMixed() {
        let uW = parseInt(document.getElementById('mixW').value) || 0;
        let uN = parseInt(document.getElementById('mixN').value) || 0;
        let uD = parseInt(document.getElementById('mixD').value) || 0;

        // If it's a whole number, allow n and d to be blank or 0
        if (current.mn === 0) {
            if (uW === current.w && (uN === 0)) {
                complete();
                return;
            }
        }

        // Standard Mixed Number Check
        if (uW === current.w && uN === current.mn && uD === current.md) {
            complete();
        } else {
            fail();
        }
        showScore();
    }

    function complete() {
        streak++;
        document.getElementById('streak').textContent = "Streak: " + streak;
        document.getElementById('msg').textContent = "Excellent!";
        document.getElementById('msg').style.color = "#10b981";
        //cert
            if(!checked){
                        correct();
                    }
                    checked = true;
                    setTimeout(() => {
                       generate();
                       checked = false;
                    }, 800);
    }

    function fail() {
        streak = 0;
        document.getElementById('streak').textContent = "Streak: 0";
        document.getElementById('msg').textContent = "Try again—remember to simplify fully.";
        document.getElementById('msg').style.color = "#ef4444";
        wrong();
    }

    const inputIds = ['ansN', 'ansD', 'mixW', 'mixN', 'mixD'];
    inputIds.forEach((id, idx) => {
        let el = document.getElementById(id);
        el.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' && idx < inputIds.length - 1) { e.preventDefault(); document.getElementById(inputIds[idx+1]).focus(); }
            if (e.key === 'ArrowUp' && idx > 0) { e.preventDefault(); document.getElementById(inputIds[idx-1]).focus(); }
            if (e.key === 'Enter') {
                if (document.activeElement.id === 'ansN' || document.activeElement.id === 'ansD') check();
                else checkMixed();
            }
        });
        el.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
    });

    setInterval(() => {
        let elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        document.getElementById('timer').textContent = `Time: ${elapsed}s`;
    }, 100);

    generate();
</script>
</body>
</html>
