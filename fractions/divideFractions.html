<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Bar Division Demo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 800px; width: 100%; text-align: center; }
        
        h2 { margin-top: 0; color: #ff0077; }

        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; background: #fafafa; padding: 20px; border-radius: 15px; }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; color: #666; }
        select { padding: 8px; border-radius: 8px; border: 2px solid #ddd; font-weight: bold; }

        /* The Visualizer Bars */
        .workspace { position: relative; margin: 40px 0; height: 150px; border: 2px dashed #ccc; border-radius: 10px; background: #fff; }
        
        .bar-label { position: absolute; left: -80px; font-weight: bold; width: 70px; text-align: right; line-height: 50px; }
        
        .whole-bar { position: relative; width: 100%; height: 50%; border-bottom: 1px solid #eee; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; }
        
        /* The Big Fraction (Dividend) */
        #dividendBar { height: 40px; background: rgba(255, 0, 119, 0.2); border: 2px solid #ff0077; border-radius: 5px; transition: width 0.5s ease; position: relative; }
        #dividendText { position: absolute; width: 100%; text-align: center; line-height: 40px; font-weight: bold; color: #ff0077; }

        /* The Small Slices (Divisor) */
        .divisor-container { width: 100%; height: 50%; display: flex; align-items: center; padding: 0 10px; box-sizing: border-box; gap: 2px; }
        .slice { height: 40px; background: #00f2ff; border: 2px solid #00acc1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #006064; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .result-text { font-size: 24px; font-weight: bold; margin-top: 20px; }
        .math-sentence { font-style: italic; color: #666; margin-top: 5px; }
        .highlight { color: #ff0077; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fraction Division: "How many fit?"</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>Start With</label>
            <select id="dividendSelect" onchange="update()">
                <option value="1">1 (Whole)</option>
                <option value="0.5" selected>1/2</option>
                <option value="0.75">3/4</option>
                <option value="0.66">2/3</option>
            </select>
        </div>

        <div style="font-size: 30px; align-self: center;">÷</div>

        <div class="control-group">
            <label>Slice Size</label>
            <select id="divisorSelect" onchange="update()">
                <option value="0.5">1/2</option>
                <option value="0.25">1/4</option>
                <option value="0.166" selected>1/6</option>
                <option value="0.125">1/8</option>
                <option value="0.1">1/10</option>
            </select>
        </div>
    </div>

    <div class="workspace">
        <div class="whole-bar">
            <div class="bar-label">Start</div>
            <div id="dividendBar"><div id="dividendText">1/2</div></div>
        </div>
        <div class="divisor-container" id="divisorContainer">
            <div class="bar-label">Fits...</div>
            </div>
    </div>

    <div class="result-text" id="resultLabel">
        It fits <span class="highlight" id="countVal">3</span> times!
    </div>
    <div class="math-sentence" id="mathSentence">
        So, 1/2 ÷ 1/6 = 3
    </div>
</div>

<script>
    function update() {
        const dividend = parseFloat(document.getElementById('dividendSelect').value);
        const divisor = parseFloat(document.getElementById('divisorSelect').value);
        const dividendName = document.getElementById('dividendSelect').options[document.getElementById('dividendSelect').selectedIndex].text;
        const divisorName = document.getElementById('divisorSelect').options[document.getElementById('divisorSelect').selectedIndex].text;
        
        // Update the big bar
        const dBar = document.getElementById('dividendBar');
        const containerWidth = document.querySelector('.whole-bar').offsetWidth - 20;
        dBar.style.width = (dividend * 100) + "%";
        document.getElementById('dividendText').innerText = dividendName;

        // Clear and fill the slices
        const container = document.getElementById('divisorContainer');
        // Remove old slices but keep the label
        const label = container.querySelector('.bar-label');
        container.innerHTML = '';
        container.appendChild(label);

        const fitCount = Math.floor((dividend / divisor) + 0.01); // Small epsilon for float math
        
        for (let i = 0; i < fitCount; i++) {
            setTimeout(() => {
                const slice = document.createElement('div');
                slice.className = 'slice';
                slice.style.width = `calc(${divisor * 100}% - 4px)`;
                slice.innerText = divisorName;
                container.appendChild(slice);
            }, i * 100);
        }

        // Update Text
        document.getElementById('countVal').innerText = fitCount;
        document.getElementById('mathSentence').innerText = `So, ${dividendName} ÷ ${divisorName} = ${fitCount}`;
    }

    // Initialize
    window.onload = update;
</script>

</body>
</html>
