<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fraction Logic: Fixed Grid</title>
    <style>
        :root { --p1: #38bdf8; --p2: #fb7185; --bg: #0f172a; --gold: #fbbf24; --green: #2ed573; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        #question-banner { width: 100%; max-width: 900px; background: #1e293b; border: 3px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 20px; text-align: center; }
        #math-problem { font-size: 2rem; font-weight: bold; color: var(--gold); }

        .main-layout { display: flex; gap: 30px; align-items: flex-start; }
        .controls { background: #1e293b; padding: 20px; border-radius: 15px; border: 1px solid #334155; width: 300px; }

        /* THE BOX */
        #visual-space { width: 300px; height: 300px; background: #0f172a; position: relative; border: 4px solid #475569; overflow: hidden; }
        
        /* THE GRID (Top Layer) */
        .grid-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display: flex; pointer-events: none; z-index: 10; }
        .line-v { border-right: 2px solid rgba(255,255,255,0.6); flex: 1; height: 100%; }
        .line-h { border-bottom: 2px solid rgba(255,255,255,0.6); flex: 1; width: 100%; }

        /* THE COLORS (Bottom Layer) */
        .fill-h { position: absolute; top:0; left:0; width: 100%; background: rgba(56, 189, 248, 0.6); z-index: 1; }
        .fill-v { position: absolute; top:0; left:0; height: 100%; background: rgba(251, 113, 133, 0.6); z-index: 2; }
        .fill-overlap { position: absolute; top:0; left:0; background: #6366f1; z-index: 3; mix-blend-mode: multiply; }

        .fraction-input { display: flex; flex-direction: column; align-items: center; gap: 5px; background: #0f172a; padding: 10px; border-radius: 8px; }
        input { width: 50px; height: 40px; text-align: center; font-size: 1.5rem; background: #1e293b; color: white; border: 1px solid #475569; }
        .vinculum { width: 40px; height: 3px; background: white; }
    </style>
</head>
<body>

<div id="question-banner">
    <div id="math-problem">Click START to see the Question</div>
</div>

<div class="main-layout">
    <div class="controls">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
            <div class="fraction-input">
                <input type="number" id="n1" value="1" oninput="draw()">
                <div class="vinculum"></div>
                <input type="number" id="d1" value="2" oninput="draw()">
            </div>
            <div style="font-size:2rem">×</div>
            <div class="fraction-input">
                <input type="number" id="n2" value="1" oninput="draw()">
                <div class="vinculum"></div>
                <input type="number" id="d2" value="2" oninput="draw()">
            </div>
        </div>
        <button onclick="check()" style="width:100%; padding:15px; background:var(--green); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT ANSWER</button>
        <button onclick="start()" style="width:100%; padding:15px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">START NEW GAME</button>
    </div>

    <div id="visual-space">
        <div id="v-grid" class="grid-overlay" style="flex-direction: row;"></div>
        <div id="h-grid" class="grid-overlay" style="flex-direction: column;"></div>
        
        <div id="fH" class="fill-h"></div>
        <div id="fV" class="fill-v"></div>
        <div id="fO" class="fill-overlap"></div>
    </div>
</div>

<script>
    let goalN, goalD, qN1, qD1;

    function draw() {
        const n1 = parseInt(document.getElementById('n1').value) || 0;
        const d1 = parseInt(document.getElementById('d1').value) || 1;
        const n2 = parseInt(document.getElementById('n2').value) || 0;
        const d2 = parseInt(document.getElementById('d2').value) || 1;

        // Draw Vertical Grid (Denominator 2)
        const vGrid = document.getElementById('v-grid');
        vGrid.innerHTML = '';
        for(let i=0; i<d2; i++) vGrid.innerHTML += '<div class="line-v"></div>';

        // Draw Horizontal Grid (Denominator 1)
        const hGrid = document.getElementById('h-grid');
        hGrid.innerHTML = '';
        for(let i=0; i<d1; i++) hGrid.innerHTML += '<div class="line-h"></div>';

        // Update Fills
        document.getElementById('fH').style.height = (n1/d1 * 100) + "%";
        document.getElementById('fV').style.width = (n2/d2 * 100) + "%";
        document.getElementById('fO').style.height = (n1/d1 * 100) + "%";
        document.getElementById('fO').style.width = (n2/d2 * 100) + "%";
    }

    function start() {
        const denoms = [2, 3, 4, 5];
        qD1 = denoms[Math.floor(Math.random()*denoms.length)];
        qN1 = 1;
        
        let mN = Math.floor(Math.random()*2)+1;
        let mD = denoms[Math.floor(Math.random()*denoms.length)];
        
        goalN = qN1 * mN;
        goalD = qD1 * mD;

        document.getElementById('math-problem').innerHTML = 
            `${qN1}/${qD1} × ?/? = <span style="color:var(--green)">${goalN}/${goalD}</span>`;
        
        document.getElementById('n1').value = qN1;
        document.getElementById('d1').value = qD1;
        draw();
    }

    function check() {
        const n1 = parseInt(document.getElementById('n1').value);
        const d1 = parseInt(document.getElementById('d1').value);
        const n2 = parseInt(document.getElementById('n2').value);
        const d2 = parseInt(document.getElementById('d2').value);

        if((n1*n2) === goalN && (d1*d2) === goalD) {
            alert("Correct! Great job.");
            start();
        } else {
            alert("Not quite. Check your denominator (total squares)!");
        }
    }
    draw();
</script>
</body>
</html>
