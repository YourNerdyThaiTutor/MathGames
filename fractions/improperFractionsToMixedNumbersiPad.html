<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mixed Number Challenge</title>
    <style>
        :root {
            --cup-color: #2c3e50; --water-color: #3498db; --overflow-color: #e74c3c;
            --cup-width: 100px; --cup-height: 120px;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; background: #fdfdfd; 
            padding: 20px; color: #333; touch-action: none; overflow: hidden; 
        }
        .math-interface {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin: 10px auto; max-width: 500px;
        }
        .whole-input, .numerator-input { border: 2px solid #ddd; border-radius: 8px; text-align: center; }
        .whole-input { width: 50px; height: 50px; font-size: 1.5rem; }
        .numerator-input { width: 45px; height: 35px; font-size: 1.2rem; }
        
        .game-layout { display: flex; justify-content: center; align-items: flex-end; gap: 30px; margin: 40px auto; min-height: 300px; }
        
        /* Cups */
        .cup-frame {
            width: var(--cup-width); height: var(--cup-height);
            border: 4px solid var(--cup-color); border-top: none;
            border-radius: 0 0 15px 15px; position: relative; background: white;
            display: flex; flex-direction: column-reverse; align-items: center;
        }
        
        .unit { width: 92%; border-radius: 3px; margin-bottom: 2px; flex-shrink: 0; pointer-events: none; }
        .blue { background: var(--water-color); }
        .red { background: var(--overflow-color); pointer-events: auto; cursor: grab; }
        
        #drag-ghost {
            position: fixed; pointer-events: none; display: none;
            width: 90px; opacity: 0.8; z-index: 1000;
            background: var(--overflow-color); border-radius: 3px;
        }
        #msg { height: 20px; margin-bottom: 10px; font-weight: bold; }
        button { padding: 10px 20px; background: #2c3e50; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="drag-ghost"></div>

    <div class="math-interface">
        <div id="problem" style="font-size: 1.8rem; font-weight: bold;">9 / 4 =</div>
        <input type="number" id="in-whole" class="whole-input" placeholder="0">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <input type="number" id="in-num" class="numerator-input" placeholder="0">
            <div style="width: 100%; height: 3px; background: #333;"></div>
            <div id="disp-den" style="font-weight: bold; color: #777;">4</div>
        </div>
        <button onclick="check()">Check</button>
    </div>
    <div id="msg"></div>

    <div class="game-layout">
        <div id="cup--1" class="cup-frame" style="overflow: visible;"></div>
        <div id="target-area" style="display: flex; gap: 20px;"></div>
    </div>

    <script>
        let total, den, targetCups, originalTotal;
        let dragOriginIdx = null; // Track where the unit came from
        const ghost = document.getElementById('drag-ghost');

        function start() {
            den = Math.floor(Math.random() * 3) + 3;
            total = Math.floor(Math.random() * (den * 2)) + (den + 1);
            originalTotal = total;
            targetCups = [0, 0, 0];
            render();
        }

        function render() {
            const h = (120/den) - 2;
            ghost.style.height = h + 'px';

            // 1. Render Source Cup (Index -1)
            const source = document.getElementById('cup--1');
            source.innerHTML = '';
            const sourceCount = originalTotal - targetCups.reduce((a, b) => a + b, 0);
            
            for(let i=0; i < sourceCount; i++) {
                const u = document.createElement('div');
                const isRed = i >= den;
                u.className = 'unit ' + (isRed ? 'red' : 'blue');
                u.style.height = h + 'px';
                if(isRed) u.onpointerdown = (e) => startDrag(e, -1);
                source.appendChild(u);
            }

            // 2. Render Target Cups (Index 0, 1, 2)
            const tCont = document.getElementById('target-area');
            tCont.innerHTML = '';
            targetCups.forEach((count, idx) => {
                const wrap = document.createElement('div');
                const cup = document.createElement('div');
                cup.className = 'cup-frame';
                cup.id = 'cup-' + idx;
                
                for(let i=0; i < count; i++) {
                    const u = document.createElement('div');
                    u.className = 'unit red';
                    u.style.height = h + 'px';
                    u.onpointerdown = (e) => startDrag(e, idx);
                    cup.appendChild(u);
                }
                wrap.appendChild(cup);
                tCont.appendChild(wrap);
            });

            document.getElementById('problem').innerText = `${originalTotal} / ${den} =`;
            document.getElementById('disp-den').innerText = den;
        }

        function startDrag(e, originIdx) {
            dragOriginIdx = originIdx;
            ghost.style.display = 'block';
            updateGhostPos(e);
            
            e.target.setPointerCapture(e.pointerId);
            e.target.onpointermove = updateGhostPos;
            e.target.onpointerup = (ev) => {
                stopDrag(ev);
                e.target.onpointermove = null;
                e.target.onpointerup = null;
            };
        }

        function updateGhostPos(e) {
            ghost.style.left = (e.clientX - 45) + 'px';
            ghost.style.top = (e.clientY - 10) + 'px';
        }

        function stopDrag(e) {
            ghost.style.display = 'none';
            const dropTarget = document.elementFromPoint(e.clientX, e.clientY);
            const cupElement = dropTarget?.closest('.cup-frame');
            
            if (cupElement) {
                const destinationIdx = parseInt(cupElement.id.replace('cup-', ''));
                
                // If moving to a target cup, check if it has room (capacity = den)
                // If moving back to source (-1), it's always allowed
                const hasRoom = (destinationIdx === -1) || (targetCups[destinationIdx] < den);

                if (hasRoom && destinationIdx !== dragOriginIdx) {
                    // Remove from origin
                    if (dragOriginIdx !== -1) targetCups[dragOriginIdx]--;
                    // Add to destination
                    if (destinationIdx !== -1) targetCups[destinationIdx]++;
                }
            }
            dragOriginIdx = null;
            render();
        }

        function check() {
            const w = parseInt(document.getElementById('in-whole').value);
            const n = parseInt(document.getElementById('in-num').value);
            const correctW = Math.floor(originalTotal / den);
            const correctN = originalTotal % den;

            const m = document.getElementById('msg');
            if(w === correctW && n === correctN) {
                m.innerHTML = "<span style='color:green'>Correct!</span>";
                setTimeout(start, 2000);
            } else {
                m.innerHTML = "<span style='color:red'>Try again!</span>";
            }
        }

        start();
    </script>
</body>
</html>
