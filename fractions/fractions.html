<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Fraction Lab v3</title>
    <style>
        :root { --p1: #38bdf8; --p2: #ef4444; --bg: #0f172a; --gold: #fbbf24; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; height: 100dvh; overflow: hidden; }
        
        header { background: #1e293b; width: 100%; padding: 15px; text-align: center; border-bottom: 2px solid #334155; }
        
        #lab-space { display: flex; flex: 1; width: 100%; max-width: 1100px; gap: 20px; padding: 20px; }
        .panel { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #334155; display: flex; flex-direction: column; }
        
        /* THE FRACTION INPUT STYLING */
        .fraction-box { display: flex; flex-direction: column; align-items: center; gap: 5px; background: #0f172a; padding: 15px; border-radius: 12px; border: 2px solid #475569; width: 100px; }
        .fraction-box input { width: 60px; height: 50px; text-align: center; font-size: 1.8rem; font-weight: bold; background: #1e293b; color: white; border: 2px solid #334155; border-radius: 8px; }
        .vinculum { width: 70px; height: 4px; background: white; border-radius: 2px; }

        /* THE TRAY */
        #tray-container { position: relative; width: 100%; height: 250px; background: #0f172a; border: 2px solid #475569; border-radius: 10px; overflow: hidden; }
        #grid-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-auto-columns: 1fr; grid-auto-flow: column; pointer-events: none; }
        .grid-line { border-right: 1px solid rgba(255,255,255,0.1); height: 100%; }
        .grid-line.whole { border-right: 4px solid var(--gold); }

        #block-layer { position: absolute; bottom: 20px; left: 0; width: 100%; height: 70px; display: flex; align-items: flex-end; }
        .slice-group { display: flex; height: 100%; position: relative; border: 1px solid rgba(0,0,0,0.3); transition: all 0.3s ease; }
        .slice { height: 100%; border-right: 1px solid rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: #0f172a; }
        
        /* CONTROLS */
        .op-btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 1rem; }
        .active-plus { background: var(--p1); color: #0f172a; box-shadow: 0 0 15px var(--p1); }
        .active-minus { background: var(--p2); color: white; box-shadow: 0 0 15px var(--p2); }

        #number-line { width: 100%; height: 60px; position: relative; margin-top: 15px; border-top: 2px solid #475569; }
        #marker { position: absolute; width: 4px; height: 35px; background: var(--gold); top: -15px; transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; box-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body>

<header><h2 style="margin:0; color:var(--gold)">Middle School Fraction Lab</h2></header>

<div id="lab-space">
    <div id="toolbox" class="panel" style="width:300px; gap:20px;">
        
        <div style="display:flex; gap:10px;">
            <button id="p-btn" class="op-btn active-plus" onclick="setOp('plus')">ADD (+)</button>
            <button id="m-btn" class="op-btn" style="background:#475569;" onclick="setOp('minus')">SUB (-)</button>
        </div>

        <div style="display:flex; align-items:center; justify-content:center; gap:15px;">
            <div class="fraction-box">
                <input type="number" id="num" value="1">
                <div class="vinculum"></div>
                <input type="number" id="den" value="3">
            </div>
            <button onclick="addBlock()" style="height:130px; width:60px; background:var(--gold); border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size:1.2rem;">➔</button>
        </div>

        <div class="panel" style="background:#0f172a; padding:10px; border-color:var(--gold);">
            <label style="font-size:0.8rem; color:var(--gold);">🔍 Match the Common Denom:</label>
            <input type="range" id="ruler-slider" min="1" max="24" value="12" oninput="drawGrid()" style="width:100%; margin-top:10px;">
            <div id="ruler-display" style="text-align:center; font-weight:bold; margin-top:5px;">Ruler: 12ths</div>
        </div>

        <button onclick="reset()" style="padding:12px; background:#ef4444; color:white; border:none; border-radius:8px; font-weight:bold;">RESET LAB</button>
    </div>

    <div id="work-area" class="panel" style="flex:1;">
        <div id="tray-container">
            <div id="grid-layer"></div>
            <div id="block-layer"></div>
        </div>
        
        <div id="number-line">
            <div id="marker" style="left:0%"></div>
            <div style="display:flex; justify-content:space-between; padding:10px 0; color:#94a3b8; font-weight:bold;">
                <span>0</span><span>1/2</span><span>1 Whole</span><span>1 1/2</span><span>2</span>
            </div>
        </div>
        <div id="total-text" style="text-align:center; font-size:2rem; color:var(--gold); font-weight:bold; text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);">Total: 0</div>
    </div>
</div>

<script>
    let total = 0;
    let mode = 'plus';

    function setOp(m) {
        mode = m;
        document.getElementById('p-btn').className = 'op-btn' + (m==='plus'?' active-plus':'');
        document.getElementById('m-btn').className = 'op-btn' + (m==='minus'?' active-minus':'');
        document.getElementById('m-btn').style.background = (m==='minus')?'var(--p2)':'#475569';
        document.getElementById('p-btn').style.background = (m==='plus')?'var(--p1)':'#475569';
    }

    function drawGrid() {
        const layer = document.getElementById('grid-layer');
        const den = parseInt(document.getElementById('ruler-slider').value);
        document.getElementById('ruler-display').innerText = `Ruler: ${den}ths`;
        layer.style.gridTemplateColumns = `repeat(${den * 2}, 1fr)`;
        layer.innerHTML = '';
        for (let i = 1; i <= den * 2; i++) {
            const line = document.createElement('div');
            line.className = 'grid-line' + (i === den || i === den*2 ? ' whole' : '');
            layer.appendChild(line);
        }
    }

    function addBlock() {
        const n = parseInt(document.getElementById('num').value);
        const d = parseInt(document.getElementById('den').value);
        if(!n || !d) return;

        const layer = document.getElementById('block-layer');
        const group = document.createElement('div');
        group.className = 'slice-group';
        const w = (n/d) * 50;
        group.style.width = w + '%';

        if (mode === 'minus') {
            group.style.marginLeft = `-${w}%`;
            group.style.backgroundColor = 'rgba(239, 68, 68, 0.6)';
            group.style.borderLeft = '3px solid #ef4444';
            total -= (n/d);
        } else {
            group.style.backgroundColor = '#38bdf8';
            group.style.borderRight = '3px solid white';
            total += (n/d);
        }

        for(let i=0; i<n; i++) {
            const s = document.createElement('div');
            s.className = 'slice';
            s.style.width = (100/n) + '%';
            s.innerText = `1/${d}`;
            group.appendChild(s);
        }
        layer.appendChild(group);
        updateUI();
    }

    function getFractionStr(val) {
        if (val <= 0.001) return "0";
        for (let d = 1; d <= 60; d++) {
            let n = Math.round(val * d);
            if (Math.abs(val - n / d) < 0.001) {
                if (n > d) {
                    let w = Math.floor(n / d);
                    let r = n % d;
                    return r === 0 ? `${w}` : `${w} ${r}/${d}`;
                }
                return `${n}/${d}`;
            }
        }
        return val.toFixed(2);
    }

    function updateUI() {
        total = Math.max(0, total);
        document.getElementById('marker').style.left = (total * 50) + '%';
        document.getElementById('total-text').innerText = `Total: ${getFractionStr(total)}`;
    }

    function reset() {
        document.getElementById('block-layer').innerHTML = '';
        total = 0;
        updateUI();
    }

    drawGrid();
</script>
</body>
</html>
