<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FOIL Speed Drill</title>
    <link rel="stylesheet" href="../assets/css/certification.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; padding: 40px; }
        .drill-card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; width: 500px; border: 1px solid #334155; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; color: #94a3b8; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .problem { font-size: 48px; font-weight: 800; margin-bottom: 30px; color: #f8fafc; letter-spacing: -1px; }
        input { background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #38bdf8; font-size: 24px; padding: 15px; width: 100%; text-align: center; outline: none; transition: 0.2s; box-sizing: border-box; }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        input.correct { border-color: #10b981; color: #10b981; }
        input.wrong { border-color: #ef4444; color: #ef4444; }
        .hint { margin-top: 20px; color: #64748b; font-size: 14px; }
        kbd { background: #334155; padding: 2px 6px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

<div class="drill-card">
    <div class="stats">
        
        <span>Best Streak: <span id="streak">0</span></span>
    </div>
    
    <div id="problem" class="problem">(x + 2)(x + 3)</div>
    
    <input type="text" id="answerInput" placeholder="x^2 + bx + c" autocomplete="off" spellcheck="false">
    
    <div class="hint">Type answer and press <kbd>Enter</kbd></div>
</div>
    <!---cert--->
    <div>
            <h1 id="scoreboard">score: 0 missed: 0</h1>
        </div>
        <div id="certOverlay">
            <div id="cert">
                <h1 style="font-size: 50px; color: #1a3a5f; margin: 0">ALGEBRA EXCELLENCE</h1>
                <p style="font-size: 24px">This award is proudly presented to</p>
                <h2
                    id="certName"
                    style="
                        font-size: 45px;
                        border-bottom: 2px solid #1a3a5f;
                        display: inline-block;
                        padding: 0 50px;
                        margin: 20px 0;
                    ">
                    Student Name
                </h2>
                <p style="font-size: 20px">For successfully solving 100 FOIL problems!</p>
                <p style="font-size: 20px" id="gradeMsg"></p>
                <div style="margin-top: 30px; font-size: 80px">⭐ 100 ⭐</div>

                <div class="no-print" style="margin-top: 30px">
                    <button onclick="window.print()" style="background: #859900">Print Certificate</button>
                    <button
                        onclick="document.getElementById('certOverlay').style.display='none'"
                        style="background: #93a1a1">
                        Back to Game
                    </button>
                </div>
            </div>
        </div>
<div id="msg"></div>
<script src="../assets/JS/GameOverlay.js"></script>

<script>
    let a, b, streak = 0, maxStreak = 0;
    const input = document.getElementById('answerInput');
    const problemEl = document.getElementById('problem');
    const streakEl = document.getElementById('streak');
    let checked = false;
    setGameName("FOILpractice");
    showScore();

    function generate() {
        // Random numbers 1-9
        a = Math.floor(Math.random() * 9) + 1;
        b = Math.floor(Math.random() * 9) + 1;
        problemEl.textContent = `(x + ${a})(x + ${b})`;
        input.value = "";
        input.className = "";
    }

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            check();
        }
    });

    function check() {
        const userVal = input.value.replace(/\s/g, "").toLowerCase();
        const sum = a + b;
        const product = a * b;
        
        // Standard form: x^2+7x+10
        const correct1 = `x^2+${sum}x+${product}`;
        const correct2 = `x^2+${product}+${sum}x`; // Accept out of order

        if (userVal === correct1 || userVal === correct2) {
            streak++;
            if (streak > maxStreak) maxStreak = streak;
            
            input.className = "correct";
            streakEl.textContent = maxStreak;
            //cert
            if(!checked){
                        correct();
                    }
                    checked = true;
                    setTimeout(() => {
                       generate();
                       checked = false;
                    }, 300);
        } else {
            streak = 0;
            input.className = "wrong";
            // Shake effect
            input.style.transform = "translateX(10px)";
            setTimeout(() => input.style.transform = "translateX(-10px)", 50);
            setTimeout(() => input.style.transform = "translateX(0)", 100);
            wrong();
        }
        showScore();
    }

    generate();
</script>

</body>
</html>
