<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tug-of-War: Pro Edition</title>
    <style>
        html{
            touch-action: manipulation;
        }
        :root { --blue: #2196f3; --red: #ff4757; --dark: #2f3542; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f1f2f6; margin: 0; padding: 10px; user-select: none; }
        
        #game-container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* Settings Section */
        .settings { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-weight: bold; }
        select, label { cursor: pointer; }

        /* Track */
        #track { position: relative; width: 100%; height: 40px; background: #333; border-radius: 20px; margin: 25px 0; border: 4px solid #222; overflow: hidden; }
        #rope { position: absolute; height: 100%; width: 10px; background: gold; left: 50%; transition: left 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); margin-left: -5px; box-shadow: 0 0 15px orange; }

        /* Gameplay Area */
        /* Pushes the two player areas to the extreme edges */
.players-area { 
    display: flex; 
    justify-content: space-between; 
    align-items: flex-start;
    width: 100%;
    gap: 10px; /* Minimum gap to prevent overlapping on small screens */
}

.player-box { 
    width: 45%; /* Limits width so they don't meet in the middle */
    max-width: 350px; 
    padding: 15px; 
    border-radius: 15px; 
    transition: 0.3s; 
    box-sizing: border-box; /* Ensures padding doesn't break the width */
}

/* Optional: Make the game container wider to support the distance */
#game-container { 
    max-width: 1200px; /* Increased from 900px */
    margin: auto; 
    background: white; 
    padding: 20px; 
    border-radius: 20px; 
}
        .p1 { background: #e3f2fd; border: 3px solid var(--blue); }
        .p2 { background: #fff1f1; border: 3px solid var(--red); }

        .question { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; min-height: 50px; }
        .current-entry { font-size: 1.5rem; background: white; width: 120px; height: 45px; line-height: 45px; border-radius: 8px; margin: 0 auto 15px; border: 2px solid #ccc; font-family: monospace; }

        /* Numpad */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 180px; margin: 0 auto; }
        .numpad button { padding: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background: white; box-shadow: 0 3px 0 #bbb; 
        touch-action: none; /* Prevents zoom/scroll interference */
        user-select: none;  /* Prevents highlighting text */
        }
        .numpad button:active { 
            background: #dfe4ea; /* Visual feedback for the tap */
        transform: scale(0.95);
            
        }
        .numpad .clr { background: #ffa502; color: white; grid-column: span 1; 
            
        }

        .win-msg { font-size: 2.5rem; font-weight: bold; color: #2ed573; margin: 15px; display: none; }
        .restart-btn { margin-top: 20px; padding: 12px 30px; background: var(--dark); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div id="game-container">
    <h2>Math Tug-of-War</h2>

    <div class="settings">
        <div class="setting-group">
            Difficulty: 
            <select id="diff-select" onchange="resetGame()">
                <option value="10">Easy (1-10)</option>
                <option value="25">Medium (1-25)</option>
                <option value="100">Hard (1-100)</option>
            </select>
        </div>
        <div class="setting-group">
            <label><input type="checkbox" class="op" value="+" checked> + </label>
            <label><input type="checkbox" class="op" value="-"> - </label>
            <label><input type="checkbox" class="op" value="*"> × </label>
            <label><input type="checkbox" class="op" value="/"> ÷ </label>
        </div>
    </div>
    
    <div id="track"><div id="rope"></div></div>
    <div id="winner" class="win-msg"></div>

    <div class="players-area">
        <div class="player-box p1">
            <div class="question" id="p1-q">...</div>
            <div class="current-entry" id="p1-display"></div>
            <div class="numpad" id="p1-pad"></div>
        </div>

        <div class="player-box p2">
            <div class="question" id="p2-q">...</div>
            <div class="current-entry" id="p2-display"></div>
            <div class="numpad" id="p2-pad"></div>
        </div>
    </div>
    
    <button class="restart-btn" onclick="resetGame()">New Match / Update Settings</button>
</div>

<script>
    let ropePos = 50;
    let p1Target, p2Target;
    let p1Typed = "", p2Typed = "";
    window.addEventListener('keydown', (e) => {
    // Check if the key pressed is a digit 0-9
    if (e.key >= '0' && e.key <= '9') {
        
        // PLAYER 1: Uses the standard top-row number keys
        if (e.code.startsWith('Digit')) {
            handleInput(1, e.key);
        }
        
        
        // PLAYER 2: Uses the Numpad number keys
        if (e.code.startsWith('Numpad')) {
            handleInput(2, e.key);
        }
        
    }
   
    const isRightSideDigit = e.code.startsWith('Digit') && ['6', '7', '8', '9', '0'].includes(key);
    
    if (isRightSideDigit) {
        handleInput(2, key);
    }
    
    // Optional: Clear key
    
    if (e.key === 'q') { p1Typed = ""; updateDisplays(); } // 'Q' clears P1
    if (e.key === 'Backspace') { p2Typed = ""; updateDisplays(); } // 'Enter' clears P2
});
    function createPads() {
    [1, 2].forEach(p => {
        const container = document.getElementById(`p${p}-pad`);
        container.innerHTML = ""; 
        
        // Numbers 1-9
        for (let i = 1; i <= 9; i++) {
            let btn = document.createElement('button');
            btn.innerText = i;
            // Using pointerdown for faster, simultaneous response
            btn.onpointerdown = (e) => {
                e.preventDefault(); 
                handleInput(p, i.toString());
            };
            container.appendChild(btn);
        }
        
        // Zero
        let zero = document.createElement('button');
        zero.innerText = "0";
        zero.onpointerdown = (e) => {
            e.preventDefault();
            handleInput(p, "0");
        };
        container.appendChild(zero);

        // Clear (C)
        let clr = document.createElement('button');
        clr.className = "clr";
        clr.innerText = "C";
        clr.style.gridColumn = "span 2";
        clr.onpointerdown = (e) => {
            e.preventDefault();
            if(p === 1) p1Typed = ""; else p2Typed = ""; 
            updateDisplays();
        };
        container.appendChild(clr);
    });
}

    function generateProblem(player) {
        const max = parseInt(document.getElementById('diff-select').value);
        const ops = Array.from(document.querySelectorAll('.op:checked')).map(cb => cb.value);
        
        // Default to addition if nothing selected
        const op = ops.length > 0 ? ops[Math.floor(Math.random() * ops.length)] : "+";
        
        let a, b, ans;
        
        switch(op) {
            case '+':
                a = Math.floor(Math.random() * max) + 1;
                b = Math.floor(Math.random() * max) + 1;
                ans = a + b;
                break;
            case '-':
                a = Math.floor(Math.random() * max) + Math.floor(max/2);
                b = Math.floor(Math.random() * a) + 1; // Ensure positive result
                ans = a - b;
                break;
            case '*':
                a = Math.floor(Math.random() * (max > 25 ? 12 : 10)) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                ans = a * b;
                break;
            case '/':
                ans = Math.floor(Math.random() * 10) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                a = ans * b; // Work backwards for clean division
                break;
        }

        const symbol = op === '*' ? '×' : (op === '/' ? '÷' : op);
        document.getElementById(`p${player}-q`).innerText = `${a} ${symbol} ${b}`;
        return ans;
    }

    function handleInput(player, val) {
    // 1. Identify which player is typing
    if (player === 1) {
        p1Typed += val; // Append the number to P1's string
        
        // Check if P1 is correct
        if (parseInt(p1Typed) === p1Target) {
            ropePos -= 6;
            p1Typed = ""; // Clear only P1
            p1Target = generateProblem(1);
        } else if (p1Typed.length > 4) {
            p1Typed = ""; // Auto-clear if they miss it after 5 digits
        }
    } else {
        p2Typed += val; // Append the number to P2's string
        
        // Check if P2 is correct
        if (parseInt(p2Typed) === p2Target) {
            ropePos += 6;
            p2Typed = ""; // Clear only P2
            p2Target = generateProblem(2);
        } else if (p2Typed.length > 4) {
            p2Typed = ""; // Auto-clear if they miss it after 5 digits
        }
    }
    
    // 2. Update the UI and the Rope
    updateDisplays();
    updateRope();
}

    function updateDisplays() {
        document.getElementById('p1-display').innerText = p1Typed;
        document.getElementById('p2-display').innerText = p2Typed;
    }

    function updateRope() {
        document.getElementById('rope').style.left = ropePos + "%";
        if (ropePos <= 5) endGame("Player 1 (Blue)");
        if (ropePos >= 95) endGame("Player 2 (Red)");
    }

    function endGame(winnerName) {
        document.getElementById('winner').innerText = `🎉 ${winnerName} Wins!`;
        document.getElementById('winner').style.display = "block";
        document.querySelectorAll('.numpad button').forEach(b => b.disabled = true);
    }

    function resetGame() {
        ropePos = 50;
        p1Typed = ""; p2Typed = "";
        p1Target = generateProblem(1);
        p2Target = generateProblem(2);
        updateDisplays();
        updateRope();
        document.getElementById('winner').style.display = "none";
        document.querySelectorAll('.numpad button').forEach(b => b.disabled = false);
    }

    createPads();
    resetGame();
</script>
</body>
</html>
