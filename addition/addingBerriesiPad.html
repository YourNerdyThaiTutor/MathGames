<html lang="en">

    <meta property="og:title" content="Adding Berries | Math Game For Kids (iPad Version)">
    <meta property="og:description" content="An Addition Math Game For Kids (iPad Version)">
    <meta property="og:image" content="https://i.imgur.com/YS4kbsS.png">
    <meta property="og:type" content="article">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iPad Math with Loading Screen</title>
    <style>
        :root { --berry-size: 65px; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #E0F2F1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        /* ⏳ LOADING SCREEN STYLES */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #00897B;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 8px solid #B2DFDB;
            border-top: 8px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #equation { font-size: 4.5rem; color: #00695C; margin: 10px 0; font-weight: bold; }

        #game-board {
            background: white;
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 12px 0 #80CBC4;
            width: 92%;
            max-width: 650px;
            text-align: center;
            border: 6px solid #4DB6AC;
        }

        #instruction { font-size: 1.6rem; min-height: 2.5em; color: #004D40; margin-bottom: 10px; }

        #source-tray {
            display: flex;
            justify-content: center;
            padding: 25px;
            background: #B2DFDB;
            border-radius: 30px;
            margin-bottom: 15px;
            border: 4px dashed #4DB6AC;
        }

        .berry {
            font-size: 3.5rem;
            width: var(--berry-size);
            height: var(--berry-size);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        #drag-proxy {
            position: fixed;
            pointer-events: none;
            display: none;
            z-index: 9999;
            font-size: 4rem;
        }

        .zones-container {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .drop-zone {
            width: 220px;
            min-height: 180px;
            border: 5px solid #4DB6AC;
            border-radius: 25px;
            background: #F1F8E9;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            padding: 15px;
            gap: 8px;
            transition: all 0.3s;
        }

        .drop-zone.active { background: #E0F2F1; transform: scale(1.03); }
        .drop-zone.full { border-color: #2E7D32; background: #DCEDC8; }

        #choice-container { display: none; justify-content: center; gap: 20px; margin-top: 20px; }

        .choice-btn {
            background: #FF7043;
            color: white;
            font-size: 3rem;
            width: 90px;
            height: 90px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 0 #BF360C;
            cursor: pointer;
        }

        #next-btn {
            margin-top: 25px;
            padding: 20px 50px;
            font-size: 2rem;
            background: #26A69A;
            color: white;
            border: none;
            border-radius: 50px;
            display: none;
            box-shadow: 0 8px 0 #00695C;
        }

        .counted { filter: grayscale(1) opacity(0.2); transform: scale(0.8); transition: 0.3s; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <div style="font-size: 2rem;">Loading Voices...</div>
    <div style="margin-top: 10px;">(Please wait a moment)</div>
</div>

<div id="equation">? + ?</div>

<div id="game-board">
    <div id="instruction">Waiting...</div>

    <div id="source-tray">
        <div class="berry" id="master-berry">🫐</div>
    </div>

    <div class="zones-container">
        <div>
            <div id="zone1" class="drop-zone"></div>
            <div style="font-weight:bold; color:#00796B; margin-top:8px;">Box 1</div>
        </div>
        <div style="font-size: 3rem; align-self: center;">+</div>
        <div>
            <div id="zone2" class="drop-zone"></div>
            <div style="font-weight:bold; color:#00796B; margin-top:8px;">Box 2</div>
        </div>
    </div>

    <div id="choice-container"></div>
    <div id="total-display" style="font-size: 3.5rem; margin-top: 15px; font-weight: bold; color: #2E7D32;">?</div>
    <button id="next-btn" onclick="startNewMission()">Next Level! ➔</button>
</div>

<div id="drag-proxy">🫐</div>

<script>
    let t1 = 0, t2 = 0;
    let mode = 'DRAG';
    let currentCount = 0;
    let voicesLoaded = false;
    const proxy = document.getElementById('drag-proxy');
    const master = document.getElementById('master-berry');

    // CHECK FOR VOICES
    function checkVoices() {
        let voices = window.speechSynthesis.getVoices();
        if (voices.length > 0) {
            voicesLoaded = true;
            hideLoadingScreen();
        }
    }

    // Modern browsers fire this when voices are ready
    window.speechSynthesis.onvoiceschanged = checkVoices;

    // Safety check for browsers that don't fire onvoiceschanged properly
    let checkInterval = setInterval(() => {
        checkVoices();
        if (voicesLoaded) clearInterval(checkInterval);
    }, 500);

    function hideLoadingScreen() {
        const screen = document.getElementById('loading-screen');
        screen.style.opacity = '0';
        setTimeout(() => {
            screen.style.display = 'none';
            startNewMission(); // Game starts ONLY when voices are ready
        }, 600);
    }

    function speak(text, callback) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (callback) msg.onend = callback;
        window.speechSynthesis.speak(msg);
    }

    // --- DRAG LOGIC ---
    master.addEventListener('touchstart', (e) => {
        if (mode !== 'DRAG') return;
        proxy.style.display = 'block';
        updateProxyPos(e.touches[0].clientX, e.touches[0].clientY);
    });

    window.addEventListener('touchmove', (e) => {
        if (proxy.style.display === 'block') {
            updateProxyPos(e.touches[0].clientX, e.touches[0].clientY);
            const r1 = document.getElementById('zone1').getBoundingClientRect();
            const r2 = document.getElementById('zone2').getBoundingClientRect();
            const x = e.touches[0].clientX;
            const y = e.touches[0].clientY;
            
            document.getElementById('zone1').classList.remove('active');
            document.getElementById('zone2').classList.remove('active');
            
            if (x > r1.left && x < r1.right && y > r1.top && y < r1.bottom) document.getElementById('zone1').classList.add('active');
            if (x > r2.left && x < r2.right && y > r2.top && y < r2.bottom) document.getElementById('zone2').classList.add('active');
        }
    });

    window.addEventListener('touchend', (e) => {
        if (proxy.style.display !== 'block') return;
        proxy.style.display = 'none';
        const touch = e.changedTouches[0];
        
        const r1 = document.getElementById('zone1').getBoundingClientRect();
        const r2 = document.getElementById('zone2').getBoundingClientRect();
        const x = touch.clientX;
        const y = touch.clientY;

        let targetZone = null;
        if (x > r1.left && x < r1.right && y > r1.top && y < r1.bottom) targetZone = document.getElementById('zone1');
        if (x > r2.left && x < r2.right && y > r2.top && y < r2.bottom) targetZone = document.getElementById('zone2');

        if (targetZone) {
            if (targetZone.id === 'zone1' && targetZone.children.length < t1) addBerry(targetZone);
            if (targetZone.id === 'zone2' && targetZone.children.length < t2) addBerry(targetZone);
        }
        document.getElementById('zone1').classList.remove('active');
        document.getElementById('zone2').classList.remove('active');
    });

    function updateProxyPos(x, y) {
        proxy.style.left = (x - 35) + 'px';
        proxy.style.top = (y - 35) + 'px';
    }

    function addBerry(zone) {
        const b = document.createElement('div');
        b.className = 'berry';
        b.innerText = '🫐';
        b.onclick = () => handleTapCount(b);
        zone.appendChild(b);
        speak(zone.children.length);
        
        if (document.getElementById('zone1').children.length === t1) document.getElementById('zone1').classList.add('full');
        if (document.getElementById('zone2').children.length === t2) document.getElementById('zone2').classList.add('full');

        if (document.getElementById('zone1').children.length === t1 && document.getElementById('zone2').children.length === t2) {
            mode = 'COUNT';
            const msg = "Excellent! Now tap the berries to count them!";
            document.getElementById('instruction').innerText = msg;
            speak(msg);
        }
    }

    function handleTapCount(el) {
        if (mode === 'COUNT' && !el.classList.contains('counted')) {
            currentCount++;
            el.classList.add('counted');
            document.getElementById('total-display').innerText = currentCount;
            if (currentCount === (t1 + t2)) speak(currentCount, showMultipleChoice);
            else speak(currentCount);
        }
    }

    function showMultipleChoice() {
        mode = 'CHOICE';
        const correct = t1 + t2;
        const choices = [correct, correct + 1, correct - 1].sort(() => Math.random() - 0.5);
        const container = document.getElementById('choice-container');
        container.innerHTML = '';
        container.style.display = 'flex';
        document.getElementById('instruction').innerText = "Which number is the answer?";
        speak("Which number is the answer?");
        choices.forEach(num => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = num;
            btn.onclick = () => checkChoice(num, correct);
            container.appendChild(btn);
        });
    }

    function checkChoice(picked, correct) {
        if (picked === correct) {
            speak(`YES! ${t1} plus ${t2} is ${correct}!`, () => {
                document.getElementById('next-btn').style.display = 'inline-block';
            });
            document.getElementById('choice-container').style.display = 'none';
        } else {
            speak("Not that one, try again!");
        }
    }

    function startNewMission() {
        t1 = Math.floor(Math.random() * 3) + 2;
        t2 = Math.floor(Math.random() * 3) + 2;
        mode = 'DRAG';
        currentCount = 0;
        document.getElementById('zone1').innerHTML = '';
        document.getElementById('zone2').innerHTML = '';
        document.getElementById('zone1').classList.remove('full');
        document.getElementById('zone2').classList.remove('full');
        document.getElementById('choice-container').style.display = 'none';
        document.getElementById('total-display').innerText = '?';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('equation').innerText = `${t1} + ${t2}`;
        const msg = `Put ${t1} berries in Box 1 and ${t2} in Box 2!`;
        document.getElementById('instruction').innerText = msg;
        speak(msg);
    }
</script>

</body>
</html>
