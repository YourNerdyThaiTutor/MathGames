<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Labeler</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #e0f7fa;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
        }
        .controls {
            margin-bottom: 20px;
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            border: 3px solid #00acc1;
        }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            font-size: 1.1rem;
            border-radius: 5px;
            border: 2px solid #00acc1;
        }

        /* The Geometry Area */
        .workspace {
            display: inline-grid;
            grid-template-columns: auto auto; /* Label on left, Grid on right */
            grid-template-rows: auto auto;    /* Label on top, Grid on bottom */
            gap: 10px;
            align-items: center;
            justify-items: center;
            margin: 20px;
        }

        #top-label {
            grid-column: 2;
            grid-row: 1;
            font-weight: bold;
            color: #d32f2f;
            font-size: 1.4rem;
        }

        #side-label {
            grid-column: 1;
            grid-row: 2;
            font-weight: bold;
            color: #1976d2;
            font-size: 1.4rem;
            /* Rotate the text to stand up along the side */
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        #grid-container {
            grid-column: 2;
            grid-row: 2;
            display: grid;
            gap: 4px;
            background-color: #ccc;
            padding: 8px;
            border-radius: 4px;
        }

        .square {
            width: 40px;
            height: 40px;
            background-color: #fff;
            cursor: pointer;
            border-radius: 4px;
        }
        .square.counted {
            background-color: #ffc107;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        .quiz-section {
            margin-top: 20px;
            padding: 15px;
            background: #f1f8e9;
            border-radius: 10px;
        }
        #guessInput {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            border: 2px solid #689f38;
            border-radius: 5px;
        }
        .feedback {
            margin-top: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            height: 1.5em;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #00acc1;
            color: white;
            margin: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Area Builder 📐</h1>
        
        <div class="controls">
            Width: <input type="number" id="wIn" value="5" min="1" max="10">
            Height: <input type="number" id="hIn" value="3" min="1" max="10">
            <br>
            <button onclick="resetGrid()">Build New Shape</button>
        </div>

        <div class="workspace">
            <div id="top-label"></div>
            <div id="side-label"></div>
            <div id="grid-container"></div>
        </div>

        <div class="quiz-section">
            <p>Tap boxes to help you count. What is the total area?</p>
            <input type="number" id="guessInput" placeholder="?">
            <button onclick="checkAnswer()" style="background:#689f38">Check!</button>
            <div id="feedback" class="feedback"></div>
        </div>
    </div>

    <script>
        function resetGrid() {
            const w = parseInt(document.getElementById('wIn').value) || 1;
            const h = parseInt(document.getElementById('hIn').value) || 1;
            const grid = document.getElementById('grid-container');
            const topLabel = document.getElementById('top-label');
            const sideLabel = document.getElementById('side-label');
            const feedback = document.getElementById('feedback');
            const guessInput = document.getElementById('guessInput');

            // Set Labels
            topLabel.innerText = `Width: ${w}`;
            sideLabel.innerText = `Height: ${h}`;
            
            // Reset UI
            feedback.innerText = "";
            guessInput.value = "";
            grid.style.gridTemplateColumns = `repeat(${w}, 40px)`;
            grid.innerHTML = '';

            // Generate Squares
            for (let i = 0; i < w * h; i++) {
                const box = document.createElement('div');
                box.classList.add('square');
                box.onclick = function() {
                    this.classList.toggle('counted');
                };
                grid.appendChild(box);
            }
        }

        function checkAnswer() {
            const w = parseInt(document.getElementById('wIn').value) || 0;
            const h = parseInt(document.getElementById('hIn').value) || 0;
            const guess = parseInt(document.getElementById('guessInput').value);
            const feedback = document.getElementById('feedback');
            const actualArea = w * h;

            if (guess === actualArea) {
                feedback.style.color = "#2e7d32";
                feedback.innerHTML = `🎉 Correct! ${w} (W) × ${h} (H) = ${actualArea}`;
            } else {
                feedback.style.color = "#c62828";
                feedback.innerText = "Try again! Count the yellow boxes.";
            }
        }

        // Run on start
        resetGrid();
    </script>
</body>
</html>
