<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Decimal Mastery Drill</title>
    <link rel="stylesheet" href="../assets/css/certification.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #0f172a; color: white; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 500px; border: 1px solid #334155; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
        
        .problem-display { font-size: 48px; font-weight: bold; margin: 30px 0; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .op { color: #38bdf8; }

        .input-container { margin-top: 20px; }
        input { 
            background: #0f172a; 
            border: 3px solid #475569; 
            color: white; 
            width: 200px; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 32px; 
            outline: none; 
            transition: all 0.2s;
        }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        
        .tip-box { 
            margin-top: 25px; 
            padding: 15px; 
            background: #334155; 
            border-radius: 10px; 
            font-size: 14px; 
            color: #cbd5e1;
            border-left: 4px solid #38bdf8;
        }

        .correct { border-color: #10b981 !important; color: #10b981; }
        .error { border-color: #ef4444 !important; animation: shake 0.2s ease-in-out 0s 2; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
            100% { transform: translateX(0); }
        }

        #msg { margin-top: 15px; font-weight: bold; height: 20px; }
        button { margin-top: 20px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="stats">
        <span id="streak">Streak: 0</span>
        <span id="best">Best: 0</span>
    </div>

    <div class="problem-display">
        <span id="num1">0.0</span>
        <span class="op" id="operator">+</span>
        <span id="num2">0.0</span>
        <span class="op">=</span>
    </div>

    <div class="input-container">
        <input type="number" id="ans" step="any" placeholder="?" autocomplete="off">
    </div>

    <div id="msg"></div>

    <div class="tip-box" id="tip">
        Line up the decimal points!
    </div>
</div>

    <!---cert--->
    <div>
            <h1 id="scoreboard">score: 0 missed: 0</h1>
        </div>
        <div id="certOverlay">
            <div id="cert">
                <h1 style="font-size: 50px; color: #1a3a5f; margin: 0">ALGEBRA EXCELLENCE</h1>
                <p style="font-size: 24px">This award is proudly presented to</p>
                <h2
                    id="certName"
                    style="
                        font-size: 45px;
                        border-bottom: 2px solid #1a3a5f;
                        display: inline-block;
                        padding: 0 50px;
                        margin: 20px 0;
                    ">
                    Student Name
                </h2>
                <p style="font-size: 20px">For successfully solving 100 Fractions problems!</p>
                <p style="font-size: 20px" id="gradeMsg"></p>
                <div style="margin-top: 30px; font-size: 80px">⭐ 100 ⭐</div>

                <div class="no-print" style="margin-top: 30px">
                    <button onclick="window.print()" style="background: #859900">Print Certificate</button>
                    <button
                        onclick="document.getElementById('certOverlay').style.display='none'"
                        style="background: #93a1a1">
                        Back to Game
                    </button>
                </div>
            </div>
        </div>
<script src="../assets/JS/GameOverlay.js"></script>

<script>
    let currentAns = 0;
    let streak = 0;
    let best = 0;
    let checked = false;
    setGameName("decimalSpeedDrill");
    showScore();

    function generate() {
        const ops = ['+', '-', '×', '÷'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        let n1, n2, result;

        switch(op) {
            case '+':
                n1 = (Math.random() * 20).toFixed(1);
                n2 = (Math.random() * 20).toFixed(1);
                result = parseFloat(n1) + parseFloat(n2);
                document.getElementById('tip').innerText = "Tip: Line up the decimal points!";
                break;
            case '-':
                n1 = (Math.random() * 30 + 10).toFixed(1);
                n2 = (Math.random() * 10).toFixed(1);
                result = parseFloat(n1) - parseFloat(n2);
                document.getElementById('tip').innerText = "Tip: Remember to borrow if the top digit is smaller!";
                break;
            case '×':
                n1 = (Math.random() * 10).toFixed(1);
                n2 = (Math.random() * 5).toFixed(1);
                result = parseFloat(n1) * parseFloat(n2);
                document.getElementById('tip').innerText = "Tip: Count total decimal places in the problem!";
                break;
            case '÷':
                // Generate simple division: (result * n2 = n1)
                n2 = (Math.random() * 4 + 1).toFixed(1); 
                result = (Math.random() * 5 + 1).toFixed(1);
                n1 = (parseFloat(n2) * parseFloat(result)).toFixed(2);
                document.getElementById('tip').innerText = "Tip: Move the decimal to make the divisor a whole number!";
                break;
        }

        currentAns = parseFloat(result.toString()); // Clean up float precision
        document.getElementById('num1').textContent = n1;
        document.getElementById('num2').textContent = n2;
        document.getElementById('operator').textContent = op;
        
        const input = document.getElementById('ans');
        input.value = "";
        input.classList.remove('correct', 'error');
        input.focus();
        document.getElementById('msg').textContent = "";
    }

    function check() {
        const userAns = parseFloat(document.getElementById('ans').value);
        const input = document.getElementById('ans');

        // Use a small epsilon to handle JS floating point math errors (e.g. 0.1 + 0.2)
        if (Math.abs(userAns - currentAns) < 0.00001) {
            input.classList.add('correct');
            document.getElementById('msg').textContent = "Correct! ✨";
            document.getElementById('msg').style.color = "#10b981";
            streak++;
            if (streak > best) best = streak;
            updateStats();
            //cert
            if(!checked){
                        correct();
                    }
                    checked = true;
                    setTimeout(() => {
                       generate();
                       checked = false;
                    }, 800);
        } else {
            input.classList.add('error');
            document.getElementById('msg').textContent = "Try again!";
            document.getElementById('msg').style.color = "#ef4444";
            streak = 0;
            updateStats();
            setTimeout(() => input.classList.remove('error'), 400);
            wrong();
        }
        showScore();
    }

    function updateStats() {
        document.getElementById('streak').textContent = "Streak: " + streak;
        document.getElementById('best').textContent = "Best: " + best;
    }

    document.getElementById('ans').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') check();
    });

    // Initial Start
    generate();
</script>

</body>
</html>
