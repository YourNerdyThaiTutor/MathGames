<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Color Hopper Break</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none; /* Prevents selecting text while tapping */
            overflow: hidden; /* Prevents scrolling */
            transition: background-color 0.2s ease; /* Smooth background change */
        }

        #game-container {
            text-align: center;
            cursor: pointer;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #target-box {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            transition: transform 0.1s ease;
        }

        #score-display {
            font-size: 4rem;
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #message {
            font-size: 1.2rem;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Instructions visual */
        .tap-indicator {
            position: absolute;
            bottom: 40px;
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body id="body-bg">

    <div id="game-container">
        <div id="target-box"></div>
        <h1 id="score-display">0</h1>
        <p id="message">Tap when the colors match!</p>
        <p class="tap-indicator">⬇ TAP ANYWHERE ⬇</p>
    </div>

    <script>
        // --- Configuration ---
        const COLORS = [
            '#FF6B6B', // Red
            '#4ECDC4', // Teal
            '#FFEEAD', // Yellow
            '#96CEB4', // Green
            '#6C5B7B'  // Purple
        ];
        
        // --- Game State ---
        let score = 0;
        let gameActive = true;
        let currentColorIndex = 0;
        let targetColorIndex = 0;
        let gameSpeed = 1500; // Base speed (ms)
        let colorInterval;

        // --- DOM Elements ---
        const bodyBg = document.getElementById('body-bg');
        const targetBox = document.getElementById('target-box');
        const scoreDisplay = document.getElementById('score-display');
        const messageDisplay = document.getElementById('message');
        const gameContainer = document.getElementById('game-container');

        // --- Core Functions ---

        function getRandomIndex(currentIndex) {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * COLORS.length);
            } while (newIndex === currentIndex); // Ensure we don't pick the same color twice
            return newIndex;
        }

        function setColors() {
            if (!gameActive) return;

            // 1. Pick a new center (target) color
            targetColorIndex = getRandomIndex(targetColorIndex);
            targetBox.style.backgroundColor = COLORS[targetColorIndex];

            // 2. Decide if we *should* match the background this time (50% chance)
            const shouldMatch = Math.random() > 0.5;

            if (shouldMatch) {
                currentColorIndex = targetColorIndex;
            } else {
                currentColorIndex = getRandomIndex(targetColorIndex);
            }

            bodyBg.style.backgroundColor = COLORS[currentColorIndex];
        }

        function handleTap() {
            if (!gameActive) {
                resetGame();
                return;
            }

            // Visual feedback for tap
            targetBox.style.transform = 'scale(0.9)';
            setTimeout(() => targetBox.style.transform = 'scale(1)', 100);

            // Check if colors match
            if (currentColorIndex === targetColorIndex) {
                // SUCCESS!
                score++;
                scoreDisplay.innerText = score;
                messageDisplay.innerText = "Match! Keep going!";
                
                // Speed up slightly
                if (gameSpeed > 500) gameSpeed -= 50; 
                
                // Instantly cycle the color and restart the timer
                cycleColor();
            } else {
                // GAME OVER
                gameOver();
            }
        }

        function cycleColor() {
            if (!gameActive) return;
            
            clearInterval(colorInterval); // Stop old timer
            setColors(); // Change colors
            
            // Set new timer at current speed
            colorInterval = setInterval(setColors, gameSpeed);
        }

        function gameOver() {
            gameActive = false;
            clearInterval(colorInterval);
            
            bodyBg.style.backgroundColor = '#222'; // Dark background
            targetBox.style.backgroundColor = '#444'; // Dark box
            
            messageDisplay.innerHTML = `<b style="color: #FF6B6B">Ouch! No match.</b><br>Final Score: ${score}<br>Tap to reset!`;
        }

        function resetGame() {
            score = 0;
            gameSpeed = 1500;
            gameActive = true;
            scoreDisplay.innerText = '0';
            messageDisplay.innerText = "Tap when the colors match!";
            cycleColor();
        }

        // --- Setup ---
        // Setup input (works for mouse clicks and taps)
        gameContainer.addEventListener('mousedown', (e) => {
            // Only respond to left clicks, not background UI elements if they existed
            if(e.button === 0) handleTap(); 
        });

        // Start the game loop
        cycleColor();

    </script>
</body>
</html>
