<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Monster Munch!</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #3a0066; cursor: crosshair; }
        #ui {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: #fff; pointer-events: none; user-select: none;
        }
        #timer { font-size: 40px; color: #ffeb3b; margin: 0; }
        #score { font-size: 20px; color: #00ffcc; }
        #final {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui">
        <p id="timer">20</p>
        <p id="score">Munched: 0</p>
    </div>

    <div id="final">
        <h1 id="result-msg">MONSTER FED!</h1>
        <p id="final-score"></p>
        <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer;">Play Again</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let timeLeft = 20;
    let gameActive = true;
    let particles = [];
    let treats = [];

    class Treat {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 50;
            this.size = 30 + Math.random() * 20;
            this.speed = 4 + Math.random() * 6;
            this.angle = Math.random() * Math.PI * 2;
            this.emoji = ["🍭", "🍬", "🍩", "🍕", "🍔"][Math.floor(Math.random() * 5)];
        }
        update() {
            this.y -= this.speed;
            this.x += Math.sin(this.y / 50) * 2;
        }
        draw() {
            ctx.font = `${this.size}px Arial`;
            ctx.fillText(this.emoji, this.x, this.y);
        }
    }

    function spawnTreat() {
        if (gameActive) {
            treats.push(new Treat());
            setTimeout(spawnTreat, 400);
        }
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({
                x, y, 
                vx: (Math.random()-0.5)*10, 
                vy: (Math.random()-0.5)*10, 
                life: 20, 
                color
            });
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        for (let i = treats.length - 1; i >= 0; i--) {
            let t = treats[i];
            let dist = Math.hypot(mx - t.x, my - t.y);
            if (dist < t.size) {
                createExplosion(t.x, t.y, '#fff');
                treats.splice(i, 1);
                score++;
                document.getElementById('score').innerText = `Munched: ${score}`;
            }
        }
    });

    const timerInt = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) {
            gameActive = false;
            clearInterval(timerInt);
            showFinal();
        }
    }, 1000);

    function showFinal() {
        document.getElementById('final').style.display = 'block';
        document.getElementById('final-score').innerText = `You fed the monster ${score} treats!`;
    }

    function animate() {
        ctx.fillStyle = '#3a0066';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Monster Mouth at bottom
        ctx.font = "80px Arial";
        ctx.textAlign = "center";
        ctx.fillText("👾", canvas.width/2, canvas.height - 20);

        treats.forEach((t, i) => {
            t.update();
            t.draw();
            if (t.y < -50) treats.splice(i, 1);
        });

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life--;
            ctx.fillStyle = `rgba(255,255,255,${p.life/20})`;
            ctx.fillRect(p.x, p.y, 4, 4);
            if (p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }

    spawnTreat();
    animate();
</script>
</body>
</html>
