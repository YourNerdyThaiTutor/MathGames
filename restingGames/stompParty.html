<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stomp Party! 20s Break</title>
    <style>
        body { 
            margin: 0; background: #87CEEB; overflow: hidden; 
            font-family: 'Arial Black', sans-serif; display: flex; 
            justify-content: center; align-items: center; height: 100vh;
        }
        #game-ui { position: absolute; top: 20px; text-align: center; width: 100%; }
        #timer { font-size: 50px; color: #ff3e3e; text-shadow: 3px 3px 0 #fff; margin: 0; }
        #counter { font-size: 30px; color: #fff; text-shadow: 2px 2px 0 #000; }
        
        #stage {
            width: 100%; height: 200px; background: #76c73c;
            position: absolute; bottom: 0; border-top: 10px solid #5da32d;
        }
        
        #player {
            font-size: 100px; position: absolute; bottom: 150px;
            transition: transform 0.05s; user-select: none;
        }

        .squish {
            position: absolute; font-size: 50px; animation: flyUp 0.5s ease-out forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        #results {
            display: none; position: absolute; background: white;
            padding: 40px; border: 8px solid #ffeb3b; border-radius: 20px;
            text-align: center; box-shadow: 0 10px 0 #fbc02d;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <p id="timer">20</p>
        <p id="counter">STOMPS: 0</p>
    </div>

    <div id="player">🦖</div>
    <div id="stage"></div>

    <div id="results">
        <h1 id="rank-title">FINISH!</h1>
        <p id="final-score" style="font-size: 24px;"></p>
        <button onclick="location.reload()" style="padding: 10px 20px; font-weight: bold; cursor: pointer;">REPLAY</button>
    </div>

<script>
    let stomps = 0;
    let timeLeft = 20;
    let canStomp = true;
    const player = document.getElementById('player');
    const counter = document.getElementById('counter');
    const timerEl = document.getElementById('timer');

    function performStomp() {
        if (!canStomp) return;

        stomps++;
        counter.innerText = `STOMPS: ${stomps}`;

        // Mario-style animation
        player.style.transform = 'translateY(50px) scaleY(0.8)';
        
        // Visual "squish" effect
        const effect = document.createElement('div');
        effect.className = 'squish';
        effect.innerText = '💥';
        effect.style.left = (window.innerWidth/2 - 25) + (Math.random()*40 - 20) + 'px';
        effect.style.bottom = '150px';
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 500);

        // Screen shake
        document.body.style.backgroundColor = '#ffeb3b';
        setTimeout(() => {
            player.style.transform = 'translateY(0) scaleY(1)';
            document.body.style.backgroundColor = '#87CEEB';
        }, 50);
    }

    // Controls
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') performStomp(); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); performStomp(); });
    window.addEventListener('mousedown', performStomp);

    // Timer
    const gameTimer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(gameTimer);
            endGame();
        }
    }, 1000);

    function endGame() {
        canStomp = false;
        document.getElementById('results').style.display = 'block';
        let rank = "";
        if (stomps < 40) rank = "Bronze Medal 🥉";
        else if (stomps < 80) rank = "Silver Medal 🥈";
        else if (stomps < 120) rank = "Gold Medal 🥇";
        else rank = "⭐ SUPERSTAR ⭐";
        
        document.getElementById('final-score').innerText = `${stomps} Stomps!\n${rank}`;
        setTimeout(() => {
            window.parent.postMessage('closeIframe', '*');
        }, 2000);
    }
</script>
</body>
</html>
