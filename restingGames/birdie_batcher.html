<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birdie Batcher: Count!</title>
    <style>
        body {
            margin: 0; background: #4ecdc4; overflow: hidden;
            font-family: 'Arial Black', sans-serif; text-align: center;
        }
        #ui { position: absolute; top: 10px; width: 100%; color: white; text-shadow: 2px 2px #000; z-index: 10; }
        #timer { font-size: 40px; }
        
        .animal {
            position: absolute; font-size: 50px;
            transition: transform 0.1s linear;
        }

        #quiz-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 40px; border-radius: 30px; border: 10px solid #ff6b6b;
            z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }
        .option {
            background: #4ecdc4; color: white; border: none; padding: 15px 30px;
            font-size: 24px; margin: 10px; border-radius: 15px; cursor: pointer;
        }
        .option:hover { background: #45b7af; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="timer">Time: 20</div>
        <p>COUNT THE CHICKENS! 🐥</p>
    </div>

    <div id="quiz-screen">
        <h1>HOW MANY CHICKENS?</h1>
        <div id="options"></div>
    </div>

<script>
    let chickenCount = 0;
    let timeLeft = 20;
    let gameActive = true;
    const animals = ["🐥", "🦇", "🐝", "🦋", "🦉"]; // Chickens are the target

    function spawnAnimal() {
        if (!gameActive) return;

        const animal = document.createElement('div');
        const isChicken = Math.random() > 0.6; // 40% chance of being a chicken
        const type = isChicken ? "🐥" : animals[Math.floor(Math.random() * (animals.length - 1)) + 1];
        
        if (isChicken) chickenCount++;

        animal.innerText = type;
        animal.className = 'animal';
        
        // Random start position
        const side = Math.random() > 0.5 ? -50 : window.innerWidth + 50;
        const target = side < 0 ? window.innerWidth + 50 : -50;
        const y = Math.random() * (window.innerHeight - 100) + 50;
        
        animal.style.left = side + 'px';
        animal.style.top = y + 'px';
        document.body.appendChild(animal);

        // Move across screen
        setTimeout(() => {
            animal.style.transition = `left ${Math.random() * 2 + 1}s linear`;
            animal.style.left = target + 'px';
        }, 50);

        // Clean up
        setTimeout(() => animal.remove(), 3000);

        // Spawn next one
        setTimeout(spawnAnimal, Math.random() * 400 + 200);
    }

    const countdown = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `Time: ${timeLeft}`;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            gameActive = false;
            showQuiz();
            setTimeout(() => {
                window.parent.postMessage('closeIframe', '*');
            }, 2000);
        }
    }, 1000);

    function showQuiz() {
        const quiz = document.getElementById('quiz-screen');
        const optionsDiv = document.getElementById('options');
        quiz.style.display = 'block';

        // Create 3 options: the right one and two wrong ones
        const choices = [chickenCount, chickenCount + 2, Math.max(0, chickenCount - 3)];
        choices.sort(() => Math.random() - 0.5);

        choices.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = val;
            btn.onclick = () => {
                if (val === chickenCount) {
                    alert("CORRECT! 🐥 YOU ARE A SUPER COUNTER!");
                } else {
                    alert(`OOPS! There were actually ${chickenCount} chickens.`);
                }
                location.reload();
                
            };
            optionsDiv.appendChild(btn);
        });
    }

    spawnAnimal();
</script>
</body>
</html>
