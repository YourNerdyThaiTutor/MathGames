<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraction Multiplication & Division Lab</title>
    <style>
        :root { --p1: #38bdf8; --p2: #fb7185; --bg: #0f172a; --gold: #fbbf24; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        header { background: #1e293b; width: 100%; padding: 15px; text-align: center; border-bottom: 2px solid #334155; }
        
        .main-container { display: flex; flex-wrap: wrap; width: 100%; max-width: 1100px; gap: 20px; padding: 20px; justify-content: center; }
        .panel { background: #1e293b; border-radius: 15px; padding: 20px; border: 1px solid #475569; display: flex; flex-direction: column; }
        
        /* INPUT STYLING */
        .fraction-input-group { display: flex; flex-direction: column; align-items: center; gap: 5px; background: #0f172a; padding: 10px; border-radius: 10px; border: 1px solid #334155; }
        input { width: 45px; height: 35px; text-align: center; font-size: 1.2rem; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 4px; }
        .vinculum { width: 50px; height: 2px; background: white; }

        /* MULTIPLICATION AREA MODEL */
        #area-model { width: 300px; height: 300px; background: white; position: relative; border: 2px solid #94a3b8; }
        .grid-overlay-h { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; pointer-events: none; }
        .grid-overlay-v { position: absolute; width: 100%; height: 100%; display: flex; pointer-events: none; }
        .h-slice { border-bottom: 1px solid rgba(0,0,0,0.2); flex: 1; background: rgba(56, 189, 248, 0.3); }
        .v-slice { border-right: 1px solid rgba(0,0,0,0.2); flex: 1; background: rgba(251, 113, 133, 0.3); }
        .overlap { position: absolute; background: #6366f1; mix-blend-mode: multiply; pointer-events: none; }

        /* DIVISION MODEL */
        #division-tray { width: 100%; height: 120px; background: #0f172a; border: 2px dashed #475569; position: relative; display: flex; align-items: center; padding: 0 10px; }
        .divisor-block { height: 60px; background: var(--p2); border: 2px solid white; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; margin-right: 2px; position: relative; }
    </style>
</head>
<body>

<header><h2 style="margin:0; color:var(--gold)">✖️ Multiplication & ➗ Division Lab</h2></header>

<div class="main-container">
    
    <div class="panel" style="width: 350px;">
        <h3 style="margin: 0 0 10px 0; color: var(--p1); text-align: center;">Multiplication (Area)</h3>
        <p style="font-size: 0.8rem; color: #94a3b8; text-align: center;">"Find 1/2 OF 1/3"</p>
        
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom: 15px;">
            <div class="fraction-input-group">
                <input type="number" id="m-n1" value="1" oninput="updateMulti()">
                <div class="vinculum"></div>
                <input type="number" id="m-d1" value="2" oninput="updateMulti()">
            </div>
            <div style="align-self: center; font-size: 1.5rem;">×</div>
            <div class="fraction-input-group">
                <input type="number" id="m-n2" value="1" oninput="updateMulti()">
                <div class="vinculum"></div>
                <input type="number" id="m-d2" value="3" oninput="updateMulti()">
            </div>
        </div>

        <div id="area-model" style="align-self: center;">
            <div id="h-grid" class="grid-overlay-h"></div>
            <div id="v-grid" class="grid-overlay-v"></div>
            <div id="overlap-rect" class="overlap"></div>
        </div>
        
        <div id="multi-result" style="text-align: center; margin-top: 15px; font-weight: bold; color: var(--gold);">Result: 1/6</div>
    </div>

    <div class="panel" style="flex: 1; min-width: 300px;">
        <h3 style="margin: 0 0 10px 0; color: var(--p2); text-align: center;">Division (How many fit?)</h3>
        <p style="font-size: 0.8rem; color: #94a3b8; text-align: center;">"How many 1/4s fit into 1 whole?"</p>
        
        <div style="display:flex; justify-content:center; gap:20px; margin-bottom: 25px;">
            <div class="fraction-input-group">
                <input type="number" id="d-n1" value="1" oninput="updateDiv()">
                <div class="vinculum"></div>
                <input type="number" id="d-d1" value="1" oninput="updateDiv()">
            </div>
            <div style="align-self: center; font-size: 1.5rem;">÷</div>
            <div class="fraction-input-group">
                <input type="number" id="d-n2" value="1" oninput="updateDiv()">
                <div class="vinculum"></div>
                <input type="number" id="d-d2" value="4" oninput="updateDiv()">
            </div>
        </div>

        <div id="division-tray"></div>
        
        <div id="div-result" style="text-align: center; margin-top: 25px; font-size: 1.5rem; font-weight: bold; color: var(--gold);">Answer: 4</div>
    </div>

</div>

<script>
    function updateMulti() {
        const n1 = parseInt(document.getElementById('m-n1').value) || 0;
        const d1 = parseInt(document.getElementById('m-d1').value) || 1;
        const n2 = parseInt(document.getElementById('m-n2').value) || 0;
        const d2 = parseInt(document.getElementById('m-d2').value) || 1;

        const hGrid = document.getElementById('h-grid');
        const vGrid = document.getElementById('v-grid');
        const overlap = document.getElementById('overlap-rect');

        // Draw horizontal slices (Fraction 1)
        hGrid.innerHTML = '';
        for(let i=0; i<d1; i++) {
            const s = document.createElement('div');
            s.className = 'h-slice';
            if (i >= n1) s.style.background = 'transparent';
            hGrid.appendChild(s);
        }

        // Draw vertical slices (Fraction 2)
        vGrid.innerHTML = '';
        for(let i=0; i<d2; i++) {
            const s = document.createElement('div');
            s.className = 'v-slice';
            if (i >= n2) s.style.background = 'transparent';
            vGrid.appendChild(s);
        }

        // Set Overlap
        overlap.style.width = (n2/d2 * 100) + '%';
        overlap.style.height = (n1/d1 * 100) + '%';
        
        document.getElementById('multi-result').innerText = `Result: ${n1*n2} / ${d1*d2}`;
    }

    function updateDiv() {
        const n1 = parseInt(document.getElementById('d-n1').value) || 0;
        const d1 = parseInt(document.getElementById('d-d1').value) || 1;
        const n2 = parseInt(document.getElementById('d-n2').value) || 0;
        const d2 = parseInt(document.getElementById('d-d2').value) || 1;

        const tray = document.getElementById('division-tray');
        tray.innerHTML = '';
        
        const totalValue = n1/d1;
        const divisorValue = n2/d2;
        const count = totalValue / divisorValue;

        // Visualizing the "container"
        tray.style.width = "100%";
        const containerWidth = (totalValue > 1) ? 100 : (totalValue * 100);
        
        // Draw how many fit
        for(let i=0; i < Math.floor(count); i++) {
            const b = document.createElement('div');
            b.className = 'divisor-block';
            b.style.width = (divisorValue / totalValue * 100) + "%";
            b.innerText = `${n2}/${d2}`;
            tray.appendChild(b);
        }
        
        // Handle partial remainder
        if (count % 1 > 0) {
            const b = document.createElement('div');
            b.className = 'divisor-block';
            b.style.width = ((divisorValue * (count % 1)) / totalValue * 100) + "%";
            b.style.opacity = "0.5";
            b.innerText = "...";
            tray.appendChild(b);
        }

        document.getElementById('div-result').innerText = `Answer: ${count.toFixed(2)}`;
    }

    updateMulti();
    updateDiv();
</script>
</body>
</html>
