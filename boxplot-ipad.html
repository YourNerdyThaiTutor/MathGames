<!DOCTYPE html>
<html lang="en">
<head>

    <meta property="og:title" content="Box and whisker plot for Statistical Measures Game (ipad)">
    <meta property="og:description" content="Box and whisker plot for Statistical Measures Game">
    <meta property="og:image" content="https://i.imgur.com/rg1Nc1i.png">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://yournerdythaitutor.github.io/MathGames/boxplot-ipad.html">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Box Plot: Floating Cards Edition</title>
    <style>
        :root { --p1: #38bdf8; --bg: #0f172a; --gold: #fbbf24; --green: #2ed573; }
        * { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 12px; border-radius: 15px; margin-bottom: 10px; z-index: 1000; }
        button { padding: 12px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-check { background: var(--green); color: #000; }

        /* Sort Area */
        #sort-area { 
            display: flex; justify-content: center; gap: 10px; min-height: 80px; 
            padding: 15px; border: 2px dashed #334155; border-radius: 15px; 
            background: rgba(255,255,255,0.02); margin-bottom: 10px; position: relative;
        }

        .data-card { 
            background: var(--p1); color: #000; font-weight: 900; 
            padding: 12px 18px; border-radius: 8px; font-size: 1.3rem; 
            box-shadow: 0 4px 0 #0369a1; position: relative; z-index: 10;
            transition: transform 0.1s;
        }

        /* This is the class applied when the card is "Floating" */
        .dragging { 
            position: fixed !important; 
            z-index: 9999 !important; 
            pointer-events: none; 
            transform: scale(1.1); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            opacity: 0.9;
        }

        .placeholder { 
            width: 50px; height: 50px; background: rgba(255,255,255,0.1); 
            border-radius: 8px; border: 2px dashed #38bdf8; 
        }

        /* Plot Area */
        #plot-space { flex: 1; background: #0b1222; border-radius: 20px; position: relative; border: 2px solid #1e293b; margin-top: 20px; }
        #number-line { position: absolute; bottom: 140px; left: 40px; right: 40px; height: 4px; background: rgba(255,255,255,0.3); }
        .tick { position: absolute; width: 2px; height: 15px; background: white; bottom: -6px; }
        .tick-label { position: absolute; bottom: -30px; font-size: 1rem; transform: translateX(-50%); color: #94a3b8; }

        .marker { position: absolute; touch-action: none; }
        #the-box { height: 80px; top: 140px; background: rgba(56, 189, 248, 0.2); border: 2px solid #fff; z-index: 5; pointer-events: none; }
        .handle { position: absolute; width: 80px; height: 160px; top: 100px; display: flex; justify-content: center; align-items: center; z-index: 50; transform: translateX(-50%); }
        .handle::after { content: ''; width: 8px; height: 80px; background: white; border-radius: 4px; box-shadow: 0 0 15px rgba(255,255,255,0.4); }
        #the-median { width: 50px; height: 160px; top: 100px; display: flex; justify-content: center; align-items: center; transform: translateX(-50%); z-index: 40; }
        #the-median::after { content: ''; width: 10px; height: 100px; background: var(--gold); border-radius: 5px; }
        .whisker-dot { width: 60px; height: 60px; top: 180px; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; z-index: 30; }
        .whisker-dot::after { content: ''; width: 26px; height: 26px; background: white; border-radius: 50%; border: 4px solid var(--gold); }
        .val-label { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 1rem; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-check" onclick="check()">SUBMIT</button>
    <div id="streak">Streak: 0</div>
    <button style="background:#334155; color:white;" onclick="setup()">NEW CASE</button>
</div>

<div id="sort-area"></div>

<div id="plot-space">
    <div id="number-line"></div>
    <div id="the-box" class="marker" data-q1="8" data-q3="22"></div>
    <div id="m-min" class="marker whisker-dot" data-val="2"><span class="val-label">2</span></div>
    <div id="m-max" class="marker whisker-dot" data-val="28"><span class="val-label">28</span></div>
    <div id="the-median" class="marker" data-val="15"><span class="val-label">15</span></div>
    <div id="h-q1" class="marker handle" data-val="8"><span class="val-label">8</span></div>
    <div id="h-q3" class="marker handle" data-val="22"><span class="val-label">22</span></div>
</div>

<script>
    let stats = {}; let streak = 0; const maxV = 30; const pad = 40;
    let activeId = null;

    function setup() {
        const raw = Array.from({length: 8}, () => Math.floor(Math.random() * 25) + 2);
        const sorted = [...raw].sort((a,b)=>a-b);
        const getM = (a) => a.length % 2 === 0 ? (a[a.length/2-1]+a[a.length/2])/2 : a[Math.floor(a.length/2)];
        stats = { min: sorted[0], max: sorted[7], med: getM(sorted), q1: getM(sorted.slice(0, 4)), q3: getM(sorted.slice(4)) };

        const area = document.getElementById('sort-area'); area.innerHTML = '';
        raw.forEach(n => {
            const card = document.createElement('div');
            card.className = 'data-card'; card.innerText = n;

            card.onpointerdown = (e) => {
                const rect = card.getBoundingClientRect();
                const offsetX = e.clientX - rect.left;
                const offsetY = e.clientY - rect.top;
                
                // Create the placeholder
                const placeholder = document.createElement('div');
                placeholder.className = 'placeholder';
                card.after(placeholder);

                card.classList.add('dragging');
                card.style.left = rect.left + 'px';
                card.style.top = rect.top + 'px';
                card.style.width = rect.width + 'px';

                card.setPointerCapture(e.pointerId);

                card.onpointermove = (em) => {
                    // Follow finger
                    card.style.left = (em.clientX - offsetX) + 'px';
                    card.style.top = (em.clientY - offsetY) + 'px';

                    // Find nearest spot
                    const others = [...area.querySelectorAll('.data-card:not(.dragging), .placeholder')];
                    const next = others.find(c => em.clientX < c.getBoundingClientRect().left + c.offsetWidth/2);
                    if (next !== placeholder) area.insertBefore(placeholder, next || null);
                };

                card.onpointerup = () => {
                    card.classList.remove('dragging');
                    card.style.position = ''; card.style.left = ''; card.style.top = ''; card.style.width = '';
                    placeholder.replaceWith(card);
                    card.onpointermove = null;
                };
            };
            area.appendChild(card);
        });
    }

    // Plot Logic
    function pxToV(px) {
        const r = document.getElementById('plot-space').getBoundingClientRect();
        return Math.round((((px - r.left - pad) / (r.width - pad*2)) * maxV) * 2) / 2;
    }
    function vToPx(v) {
        const w = document.getElementById('plot-space').clientWidth - pad*2;
        return ((v / maxV) * w) + pad;
    }

    window.onpointerdown = (e) => {
        const t = e.target.closest('.marker');
        if(t && t.id !== 'the-box') {
            activeId = t.id;
            t.setPointerCapture(e.pointerId);
            e.preventDefault();
        }
    };

    window.onpointermove = (e) => {
        if(!activeId) return;
        let v = Math.max(0, Math.min(maxV, pxToV(e.clientX)));
        document.getElementById(activeId).setAttribute('data-val', v);
    };

    window.onpointerup = () => activeId = null;

    function sync() {
        ['m-min', 'm-max', 'the-median', 'h-q1', 'h-q3'].forEach(id => {
            const el = document.getElementById(id);
            if(!el) return;
            const v = el.getAttribute('data-val');
            el.style.left = vToPx(v) + "px";
            el.querySelector('.val-label').innerText = v;
        });

        const q1 = document.getElementById('h-q1').getAttribute('data-val');
        const q3 = document.getElementById('h-q3').getAttribute('data-val');
        const box = document.getElementById('the-box');
        box.style.left = vToPx(q1) + "px";
        box.style.width = Math.max(0, vToPx(q3) - vToPx(q1)) + "px";
        requestAnimationFrame(sync);
    }

    function check() {
        const u = {
            min: parseFloat(document.getElementById('m-min').getAttribute('data-val')),
            max: parseFloat(document.getElementById('m-max').getAttribute('data-val')),
            med: parseFloat(document.getElementById('the-median').getAttribute('data-val')),
            q1: parseFloat(document.getElementById('h-q1').getAttribute('data-val')),
            q3: parseFloat(document.getElementById('h-q3').getAttribute('data-val'))
        };
        if(u.min===stats.min && u.max===stats.max && u.med===stats.med && u.q1===stats.q1 && u.q3===stats.q3) {
            streak++; document.getElementById('streak').innerText = "Streak: " + streak;
            alert("Correct!"); setup();
        } else { alert("Try again!"); }
    }

    const nl = document.getElementById('number-line');
    for(let i=0; i<=maxV; i+=5) nl.innerHTML += `<div class="tick" style="left:${(i/maxV)*100}%"></div><div class="tick-label" style="left:${(i/maxV)*100}%">${i}</div>`;

    setup(); sync();
</script>
</body>
</html>
