<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Road Trip: To 100!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #FFDE59;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            background: white;
            padding: 30px;
            border-radius: 50px;
            box-shadow: 0 10px 0 #FF914D;
            text-align: center;
            border: 8px solid #5CE1E6;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        #progress-road {
            width: 100%;
            height: 60px;
            background-color: #545454;
            border-radius: 30px;
            position: relative;
            margin-bottom: 20px;
            overflow: hidden;
            border: 4px solid #333;
            display: none;
        }

        #progress-road.active { display: block; }

        .road-line {
            position: absolute;
            top: 50%;
            width: 100%;
            height: 4px;
            border-top: 4px dashed white;
            transform: translateY(-50%);
            opacity: 0.5;
        }

        /* 🚗 --- NEW FIXED CAR SHAPE --- */
        #car-icon {
            width: 60px;  /* Size of the car */
            height: 30px; /* Size of the car */
            position: absolute;
            top: 50%;
            left: 0%; 
            transform: translateY(-50%);
            transition: left 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 2;
        }

        /* The Main Body of the Car */
        #car-body {
            width: 100%;
            height: 100%;
            background-color: #FF5757; /* Bright Red Car */
            border-radius: 8px;
            position: relative;
            border: 2px solid black;
        }

        /* The Windows (Pointing RIGHT) */
        #car-windows {
            position: absolute;
            top: 3px;
            right: 3px; /* Windows are on the front (right side) */
            width: 30px;
            height: 12px;
            background-color: lightblue;
            border-radius: 4px;
            border: 2px solid black;
        }

        /* The Front Wheel */
        #car-wheel-front {
            width: 12px;
            height: 12px;
            background-color: black;
            border-radius: 50%;
            position: absolute;
            bottom: -5px;
            right: 10px; /* Front wheel (right side) */
        }

        /* The Back Wheel */
        #car-wheel-back {
            width: 12px;
            height: 12px;
            background-color: black;
            border-radius: 50%;
            position: absolute;
            bottom: -5px;
            left: 10px; /* Back wheel (left side) */
        }
        /* --- END OF FIXED CAR SHAPE --- 🏁 */

        #finish-line {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            font-size: 2rem;
            z-index: 1;
        }

        .screen { display: none; }
        .active { display: block; }
        h1 { color: #FF5757; font-size: 2.5rem; margin-top: 0; }
        .number-display { font-size: 6rem; color: #7ED957; margin: 10px 0; text-shadow: 2px 2px 0 #000; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        .btn {
            background-color: #5CE1E6;
            border: none;
            color: white;
            padding: 20px;
            font-size: 2rem;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 #36AEB2;
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #36AEB2; }
        .btn.orange { background-color: #FF914D; box-shadow: 0 6px 0 #CC743D; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="progress-road">
            <div class="road-line"></div>
            
            <div id="car-icon">
                <div id="car-body">
                    <div id="car-windows"></div>
                    <div id="car-wheel-front"></div>
                    <div id="car-wheel-back"></div>
                </div>
            </div>
            <div id="finish-line">🏁</div>
        </div>

        <div id="menu-screen" class="screen active">
            <h1>The Big 100!</h1>
            <p>Count by 2s all the way to 100!</p>
            <button class="btn orange" onclick="startSequence()" style="width:100%;">Start Driving!</button>
        </div>

        <div id="game-screen" class="screen">
            <div id="current-number" class="number-display">0</div>
            <p>What comes next?</p>
            <div class="btn-grid" id="option-buttons"></div>
        </div>

        <div id="win-screen" class="screen">
            <h1>🏆 100!! 🏆</h1>
            <p>You are a counting superstar!</p>
            <div class="number-display" style="color:#FFD700">100</div>
            <button class="btn orange" onclick="showMenu()" style="width:100%;">Play Again</button>
        </div>
    </div>

    <script>
        let currentLevel = 0;
        let selectedVoice = null;
        const GOAL = 100;

        function loadVoices() {
            let voices = window.speechSynthesis.getVoices();
            selectedVoice = voices.find(v => (v.name.includes('Google') || v.name.includes('Samantha')) && v.lang.includes('en')) || voices[0];
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            if (selectedVoice) utterance.voice = selectedVoice;
            utterance.pitch = 1.2;
            window.speechSynthesis.speak(utterance);
        }

        function showMenu() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menu-screen').classList.add('active');
            document.getElementById('progress-road').classList.remove('active');
        }

        function startSequence() {
            currentLevel = 0;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('progress-road').classList.add('active');
            moveCar(0);
            updateGame();
            speak("Ready, set, go! What is two more than zero?");
        }

        function updateGame() {
            document.getElementById('current-number').innerText = currentLevel;
            const correctAnswer = currentLevel + 2;
            
            let wrongAnswer = (Math.random() > 0.5) ? correctAnswer + 2 : correctAnswer - 1;
            if (wrongAnswer < 0 || wrongAnswer === currentLevel || wrongAnswer === correctAnswer) {
                wrongAnswer = correctAnswer + 1;
            }

            let options = [correctAnswer, wrongAnswer].sort(() => Math.random() - 0.5);
            const container = document.getElementById('option-buttons');
            container.innerHTML = '';

            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'btn';
                b.innerText = opt;
                b.onclick = () => handleChoice(opt, correctAnswer);
                container.appendChild(b);
            });
        }

        async function handleChoice(chosen, correct) {
            if (chosen === correct) {
                currentLevel = correct;
                await moveCar(currentLevel); 
                if (currentLevel === GOAL) {
                    speak("One hundred! You did it! You are amazing!");
                    setTimeout(() => {
                        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                        document.getElementById('win-screen').classList.add('active');
                    }, 500);
                } else {
                    speak(currentLevel);
                    updateGame();
                }
            } else {
                speak("Try again!");
            }
        }

        function moveCar(level) {
            return new Promise(resolve => {
                const car = document.getElementById('car-icon');
                // The main math: level/100, but we subtract 12.5% to avoid overlapping the flag, as the block car is wider.
                const percentage = (level / GOAL) * 85; 
                car.style.left = percentage + "%";
                setTimeout(resolve, 500); 
            });
        }
    </script>
</body>
</html>
