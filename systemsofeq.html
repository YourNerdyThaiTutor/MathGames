<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Systems Master: The Full Lab</title>
    <style>
        :root { --x-color: #4caf50; --y-color: #f44336; --c-color: #2196f3; --bg: #0f172a; --gold: #fbbf24; }
        * { box-sizing: border-box; touch-action: none; user-select: none; }
        body { margin: 0; padding: 0; height: 100dvh; background: var(--bg); display: grid; grid-template-rows: 110px 1fr 240px; font-family: 'Segoe UI', monospace; color: white; overflow: hidden; }

        header { border-bottom: 2px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #1e293b; padding: 10px; z-index: 10; }
        #mission-text { color: var(--gold); font-size: 0.85rem; margin-bottom: 8px; text-align: center; font-weight: bold; line-height: 1.2; }
        .eq-tabs { display: flex; gap: 8px; }
        .tab { padding: 6px 12px; border: 2px solid #475569; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: 0.3s; }
        .tab.active { background: #38bdf8; border-color: #38bdf8; color: #0f172a; }
        .tab.solve-tab { border-color: var(--gold); color: var(--gold); }
        .tab.solve-tab.active { background: var(--gold); color: #0f172a; }

        #stage { position: relative; display: flex; justify-content: center; align-items: center; }
        #fulcrum { position: absolute; bottom: 15%; width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 35px solid #475569; }
        #beam { position: absolute; width: 85%; height: 10px; background: #94a3b8; border-radius: 10px; display: flex; justify-content: space-between; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 0 10px; }
        
        .pan { width: 155px; min-height: 155px; background: rgba(255,255,255,0.05); border: 2px solid #475569; border-radius: 0 0 15px 15px; position: relative; top: 10px; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 32px; gap: 3px; padding: 6px; align-content: end; }
        .pan-header { position: absolute; top: -95px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; }
        .pan-label { background: rgba(15, 23, 42, 0.8); padding: 2px 6px; border-radius: 4px; color: #38bdf8; font-weight: bold; font-size: 0.9rem; min-height: 22px; }
        .clear-btn { background: #334155; border: 2px solid #ef4444; color: #ef4444; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; pointer-events: auto; }

        .block { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); }
        .block.x { background: var(--x-color); }
        .block.y { background: var(--y-color); }
        .block.c { background: var(--c-color); }
        .block.neg { border: 2px dashed white; background: transparent; }
        .block.dragging { position: fixed; pointer-events: none; z-index: 1000; opacity: 0.8; transform: scale(1.2); }

        #toolbox { background: #1e293b; border-top: 2px solid #334155; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }
        
        .btn-group { display: flex; background: #0f172a; border-radius: 10px; padding: 3px; border: 1px solid #475569; }
        .ctrl-btn { padding: 6px 10px; border: none; background: transparent; color: #94a3b8; font-weight: bold; cursor: pointer; border-radius: 7px; font-size: 0.7rem; }
        .ctrl-btn.active { background: #475569; color: white; }
        .import-btn { background: #334155; color: white; border: 1px solid #475569; padding: 5px 10px; border-radius: 5px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }

        .btn-check { background: #2ed573; color: #052e16; padding: 10px; border-radius: 10px; border: none; font-weight: bold; flex-grow: 1; cursor: pointer; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <div id="mission-text">Loading...</div>
    <div class="eq-tabs">
        <div id="tab1" class="tab active" onclick="switchEq(1)">Eq A</div>
        <div id="tab2" class="tab" onclick="switchEq(2)">Eq B</div>
        <div id="tab3" class="tab solve-tab" onclick="switchEq(3)">Visual Solve</div>
    </div>
</header>

<div id="stage">
    <div id="fulcrum"></div>
    <div id="beam">
        <div id="pan-left" class="pan"><div class="pan-header"><button class="clear-btn" onclick="clearBasket('l')">🗑️</button><div id="label-left" class="pan-label">0</div></div></div>
        <div id="pan-right" class="pan"><div class="pan-header"><button class="clear-btn" onclick="clearBasket('r')">🗑️</button><div id="label-right" class="pan-label">0</div></div></div>
    </div>
</div>
<div id="final-solve-ui" style="display:none; position:absolute; bottom:0; left:0; width:100%; height:240px; background:#1e293b; z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:15px; border-top:2px solid var(--gold);">
    <h3 style="color:var(--gold); margin:0; font-size:1rem;">Final Step: Enter the Weights</h3>
    <div style="display:flex; gap:20px;">
        <div style="text-align:center;">
            <div style="color:var(--x-color); font-weight:bold; font-size:0.8rem;">x =</div>
            <input type="number" id="final-x" style="width:60px; padding:8px; border-radius:5px; border:none; text-align:center;">
        </div>
        <div style="text-align:center;">
            <div style="color:var(--y-color); font-weight:bold; font-size:0.8rem;">y =</div>
            <input type="number" id="final-y" style="width:60px; padding:8px; border-radius:5px; border:none; text-align:center;">
        </div>
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="submitSolution()" style="background:var(--gold); color:#0f172a; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">SUBMIT</button>
        <button onclick="hideSolveUI()" style="background:#475569; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">BACK</button>
    </div>
</div>

<div id="toolbox">
    <div id="visual-controls" class="row" style="display:none; justify-content: center; gap: 5px;">
        <button class="import-btn" onclick="importEq(1, 1)">+A</button>
        <button class="import-btn" onclick="importEq(1, -1)" style="color:#f87171;">-A</button>
        <button class="import-btn" onclick="importEq(2, 1)">+B</button>
        <button class="import-btn" onclick="importEq(2, -1)" style="color:#f87171;">-B</button>
        <button onclick="showSolveUI()" style="background:var(--gold); color:#0f172a; border:none; padding:5px 12px; border-radius:5px; font-size:0.7rem; font-weight:bold; margin-left:10px;">SOLVE NOW</button>
    </div>

    <div class="row">
        <div class="btn-group">
            <button class="ctrl-btn active" id="m1" onclick="setMult(1)">x1</button>
            <button class="ctrl-btn" id="m5" onclick="setMult(5)">x5</button>
            <button class="ctrl-btn" id="m10" onclick="setMult(10)">x10</button>
        </div>
        <div class="btn-group">
            <button class="ctrl-btn active" id="btn-pos" onclick="setMode('pos')">POS (+)</button>
            <button class="ctrl-btn" id="btn-neg" onclick="setMode('neg')">NEG (-)</button>
        </div>
    </div>

    <div class="row">
        <div style="display:flex; gap:8px; align-items: center;">
            <div class="block x" onpointerdown="startDrag(event, 'x')">x</div>
            <div class="block y" onpointerdown="startDrag(event, 'y')">y</div>
            <div class="block c" onpointerdown="startDrag(event, 'c')">1</div>
        </div>
        <button class="btn-check" onclick="checkSystem()">CHECK SETUP</button>
        <button style="padding:8px; background:#475569; color:white; border:none; border-radius:8px; font-weight:bold; font-size:0.65rem;" onclick="newSystem()">NEW</button>
    </div>
</div>
    

<script>
    let dragEl = null, multiplier = 1, mode = 'pos', currentEq = 1;
    let solutions = { x: 0, y: 0 }, missions = { 1: {}, 2: {} };
    let states = {
        1: { lX: 0, lNX: 0, lY: 0, lNY: 0, lC: 0, lNC: 0, rX: 0, rNX: 0, rY: 0, rNY: 0, rC: 0, rNC: 0 },
        2: { lX: 0, lNX: 0, lY: 0, lNY: 0, lC: 0, lNC: 0, rX: 0, rNX: 0, rY: 0, rNY: 0, rC: 0, rNC: 0 },
        3: { lX: 0, lNX: 0, lY: 0, lNY: 0, lC: 0, lNC: 0, rX: 0, rNX: 0, rY: 0, rNY: 0, rC: 0, rNC: 0 }
    };

    function setMult(n) { multiplier = n; [1, 5, 10].forEach(v => document.getElementById('m'+v).classList.toggle('active', v === n)); }
    function setMode(m) { mode = m; document.getElementById('btn-pos').classList.toggle('active', m === 'pos'); document.getElementById('btn-neg').classList.toggle('active', m === 'neg'); }

    function switchEq(num) {
        currentEq = num;
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i+1 === num));
        document.getElementById('visual-controls').style.display = (num === 3) ? 'flex' : 'none';
        render();
    }

    function importEq(sourceNum, mult) {
        const src = states[sourceNum], tar = states[3];
        for (let k in src) {
            if (mult === 1) tar[k] += src[k];
            else {
                let side = k[0], type = k.slice(1);
                let newKey = type.startsWith('N') ? side + type.slice(1) : side + 'N' + type;
                tar[newKey] += src[k];
            }
        }
        simplify(3); render();
    }

    function simplify(num) {
        const s = states[num];
        ['l','r'].forEach(p => {
            ['X','Y','C'].forEach(t => {
                let cancel = Math.min(s[p+t], s[p+'N'+t]);
                s[p+t] -= cancel; s[p+'N'+t] -= cancel;
            });
        });
    }

    function newSystem() {
        const x = Math.floor(Math.random() * 4) + 2, y = Math.floor(Math.random() * 4) + 2;
        solutions = { x, y };
        const a1 = Math.floor(Math.random() * 2) + 1, b1 = 1, c1 = (a1 * x) + (b1 * y);
        const a2 = a1, b2 = Math.floor(Math.random() * 2) + 2, c2 = (a2 * x) + (b2 * y);
        missions[1] = { a: a1, b: b1, c: c1 }; missions[2] = { a: a2, b: b2, c: c2 };
        document.getElementById('mission-text').innerHTML = `Eq A: ${a1}x + ${b1}y = ${c1} <br> Eq B: ${a2}x + ${b2}y = ${c2}`;
        resetStates(); switchEq(1);
    }

    function startDrag(e, type) {
        dragEl = document.createElement('div');
        dragEl.className = `block ${type} ${mode === 'neg' ? 'neg' : ''} dragging`;
        dragEl.innerText = (mode === 'neg' ? '-' : '') + (type === 'c' ? '1' : type);
        document.body.appendChild(dragEl); moveDrag(e);
        window.onpointermove = moveDrag; window.onpointerup = stopDrag;
    }

    function moveDrag(e) { if(dragEl) { dragEl.style.left = (e.clientX-15)+'px'; dragEl.style.top = (e.clientY-15)+'px'; } }

    function stopDrag(e) {
        if(!dragEl) return;
        const lP = document.getElementById('pan-left').getBoundingClientRect(), rP = document.getElementById('pan-right').getBoundingClientRect();
        const type = dragEl.classList.contains('x') ? 'X' : (dragEl.classList.contains('y') ? 'Y' : 'C'), prefix = mode === 'neg' ? 'N' : '';
        if (isInside(e.clientX, e.clientY, lP)) states[currentEq]['l' + prefix + type] += multiplier;
        else if (isInside(e.clientX, e.clientY, rP)) states[currentEq]['r' + prefix + type] += multiplier;
        document.body.removeChild(dragEl); dragEl = null; render();
    }

    function isInside(x, y, r) { return x > r.left && x < r.right && y > r.top && y < r.bottom; }

    function render() {
        const s = states[currentEq];
        ['l', 'r'].forEach(side => {
            const pan = document.getElementById(`pan-${side==='l'?'left':'right'}`);
            document.getElementById(`label-${side==='l'?'left':'right'}`).innerText = formatText(s, side==='l'?'l':'r');
            pan.querySelectorAll('.block').forEach(b => b.remove());
            ['X', 'Y', 'C'].forEach(type => {
                ['', 'N'].forEach(p => {
                    for(let i=0; i<s[side+p+type]; i++) {
                        const b = document.createElement('div'); b.className = `block ${type.toLowerCase()} ${p==='N'?'neg':''}`;
                        b.innerText = (p==='N'?'-':'') + (type === 'C' ? '1' : type.toLowerCase());
                        b.onclick = (e) => { e.stopPropagation(); s[side+p+type]--; render(); }; pan.appendChild(b);
                    }
                });
            });
        });
        updatePhysics();
    }
    function showSolveUI() {
    document.getElementById('final-solve-ui').style.display = 'flex';
}

function hideSolveUI() {
    document.getElementById('final-solve-ui').style.display = 'none';
}

function submitSolution() {
    const gx = parseInt(document.getElementById('final-x').value);
    const gy = parseInt(document.getElementById('final-y').value);

    if (gx === solutions.x && gy === solutions.y) {
        alert("🎯 MISSION ACCOMPLISHED!\nYou found the hidden values of x and y.");
        hideSolveUI();
        newSystem();
    } else {
        alert("The scales don't lie! Those values don't balance the system. Try again.");
    }
}

    function formatText(s, pre) {
        let x = s[pre+'X']-s[pre+'NX'], y = s[pre+'Y']-s[pre+'NY'], c = s[pre+'C']-s[pre+'NC'];
        let parts = [];
        if(x !== 0) parts.push(`${x}x`);
        if(y !== 0) parts.push(`${y > 0 && parts.length ? '+ ' : ''}${y}y`);
        if(c !== 0) parts.push(`${c > 0 && parts.length ? '+ ' : ''}${c}`);
        return parts.length ? parts.join(' ') : '0';
    }

    function updatePhysics() {
        const s = states[currentEq];
        const calc = (p) => ((s[p+'X']-s[p+'NX'])*solutions.x) + ((s[p+'Y']-s[p+'NY'])*solutions.y) + (s[p+'C']-s[p+'NC']);
        const lM = calc('l'), rM = calc('r'), tilt = Math.max(-20, Math.min(20, (rM - lM) * 3));
        document.getElementById('beam').style.transform = `rotate(${tilt}deg)`;
        document.getElementById('beam').style.background = (lM === rM && lM !== 0) ? "#2ed573" : "#94a3b8";
    }

    function clearBasket(side) { const s = states[currentEq]; ['X', 'Y', 'C'].forEach(t => { s[side+t]=0; s[side+'N'+t]=0; }); render(); }
    function checkSystem() { alert(`Current Solution: x=${solutions.x}, y=${solutions.y}\nKeep balancing!`); }
    function resetStates() { Object.keys(states).forEach(k => Object.keys(states[k]).forEach(v => states[k][v] = 0)); render(); }
    newSystem();
</script>
</body>
</html>
